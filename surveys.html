<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifePoints Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #00f7ff;
            --secondary: #7700ff;
            --accent: #ff00c8;
            --success: #00ff9d;
            --dark: #0a0a18;
            --light: #f0f0f0;
            --gray: #a0a0c0;
            --transition: all 0.3s ease;
            --radius: 12px;
            --shadow: 0 0 20px rgba(0,247,255,0.3);
            --day-primary: #5d8aa8;
            --day-secondary: #8a83c2;
            --day-accent: #b19cd9;
            --day-bg: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --day-text: #495057;
            --day-card: rgba(255,255,255,0.95);
            --day-border: rgba(93,138,168,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0a0a18 0%, #12122e 100%);
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
        }

        body.light-mode {
            background: var(--day-bg);
            color: var(--day-text);
        }

        /* --- BACKGROUND EFFECTS --- */
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,247,255,0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,247,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
        .light-mode .bg-grid {
            background: linear-gradient(rgba(93,138,168,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(93,138,168,0.03) 1px, transparent 1px);
        }

        .floating-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .shape { position: absolute; border-radius: 50%; opacity: 0.3; filter: blur(60px); }
        .shape-1 { width: 300px; height: 300px; background: var(--primary); top: -100px; left: -100px; animation: float 15s infinite ease-in-out; }
        .shape-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -200px; right: -200px; animation: float 18s infinite ease-in-out reverse; }
        .shape-3 { width: 200px; height: 200px; background: var(--accent); top: 50%; left: 70%; animation: float 12s infinite ease-in-out 2s; }
        
        .light-mode .shape-1 { background: var(--day-primary); opacity: 0.10; }
        .light-mode .shape-2 { background: var(--day-secondary); opacity: 0.08; }
        .light-mode .shape-3 { background: var(--day-accent); opacity: 0.06; }

        @keyframes float {
            0%,100% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(-30px,40px) rotate(5deg); }
            50% { transform: translate(20px,-30px) rotate(-5deg); }
            75% { transform: translate(30px,30px) rotate(5deg); }
        }

        /* --- HEADER --- */
        header {
            background: rgba(10,10,24,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,247,255,0.2);
            position: sticky; top: 0; z-index: 1000;
            padding: 1rem 0;
            transition: var(--transition);
        }
        .light-mode header {
            background: rgba(248,249,250,0.92);
            border-bottom: 1px solid var(--day-border);
        }

        .header-container {
            max-width: 1200px; margin: 0 auto; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo {
            font-size: 1.8rem; font-weight: bold; color: var(--primary);
            text-decoration: none; font-family: 'Courier New', monospace;
            text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary);
            animation: flicker 5s infinite alternate;
        }
        .light-mode .logo { color: var(--day-primary); text-shadow: none; animation: none; }

        .header-right { display: flex; align-items: center; gap: 1.5rem; }

        nav ul { list-style: none; display: flex; gap: 2rem; align-items: center; }
        nav ul li a {
            text-decoration: none; color: var(--gray); font-weight: 600;
            transition: var(--transition); position: relative; padding: 0.5rem 0;
        }
        nav ul li a:hover { color: var(--primary); }
        .light-mode nav ul li a { color: #6c757d; }
        .light-mode nav ul li a:hover { color: var(--day-primary); }

        /* --- AUTH BUTTONS --- */
        .auth-area { display: flex; align-items: center; gap: 0.75rem; visibility: hidden; opacity: 0; transition: opacity 0.15s ease; }
        .auth-area.ready { visibility: visible; opacity: 1; }

        #loginBtn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.45rem 1.1rem; border-radius: 50px;
            background: rgba(0,247,255,0.1); color: var(--primary);
            border: 1px solid rgba(0,247,255,0.35);
            font-size: 0.87rem; font-weight: 600; cursor: pointer;
            transition: var(--transition);
        }
        #loginBtn:hover { background: rgba(0,247,255,0.22); transform: translateY(-2px); box-shadow: 0 0 18px rgba(0,247,255,0.35); }
        .light-mode #loginBtn { background: rgba(93,138,168,0.1); color: var(--day-primary); border-color: var(--day-border); }

        #userAvatar {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid var(--primary); object-fit: cover;
            cursor: pointer; display: none;
            box-shadow: 0 0 10px rgba(0,247,255,0.4);
        }
        .light-mode #userAvatar { border-color: var(--day-primary); }

        /* --- DASHBOARD LAYOUT --- */
        .dashboard-container {
            max-width: 1200px; margin: 2rem auto; padding: 0 2rem;
            display: grid; grid-template-columns: 1fr; gap: 2rem;
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .dashboard-container.loaded { opacity: 1; transform: translateY(0); }

        /* Stats Cards */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem;
        }
        .stat-card {
            background: rgba(10,10,24,0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,247,255,0.1); border-radius: var(--radius);
            padding: 1.5rem; position: relative; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .light-mode .stat-card {
            background: var(--day-card); border-color: var(--day-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .stat-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
        }
        .stat-label { color: var(--gray); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
        .light-mode .stat-value { color: var(--day-primary); }
        .stat-subtext { font-size: 0.8rem; color: var(--gray); margin-top: 0.5rem; }

        /* Chart Section */
        .chart-section {
            background: rgba(10,10,24,0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,247,255,0.1); border-radius: var(--radius);
            padding: 1.5rem;
        }
        .light-mode .chart-section { background: var(--day-card); border-color: var(--day-border); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .chart-tabs { display: flex; gap: 0.5rem; }
        .chart-tab {
            padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid var(--gray);
            background: transparent; color: var(--gray); cursor: pointer; font-size: 0.8rem;
        }
        .chart-tab.active { background: var(--primary); color: #000; border-color: var(--primary); }
        .light-mode .chart-tab.active { background: var(--day-primary); color: #fff; }

        /* Table */
        .table-section {
            background: rgba(10,10,24,0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(0,247,255,0.1); border-radius: var(--radius);
            padding: 1.5rem; overflow-x: auto;
        }
        .light-mode .table-section { background: var(--day-card); border-color: var(--day-border); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; color: var(--gray); font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .light-mode th { border-bottom: 1px solid var(--day-border); }
        td { padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .light-mode td { border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .badge { padding: 0.25rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .badge-encuesta { background: rgba(0,255,157,0.15); color: var(--success); }
        .badge-retiro { background: rgba(255,0,200,0.15); color: var(--accent); }
        .badge-bonus { background: rgba(255,193,7,0.15); color: #ffc107; }
        .badge-fail { background: rgba(255,60,60,0.15); color: #ff6b6b; }

        /* Loading & Toast */
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; backdrop-filter: blur(5px);
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(0,247,255,0.1);
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(0,247,255,0.1); border: 1px solid rgba(0,247,255,0.3);
            color: var(--primary); padding: 0.7rem 1.6rem; border-radius: 50px;
            opacity: 0; pointer-events: none; transition: all 0.35s ease;
            backdrop-filter: blur(10px); z-index: 3000;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.error { background: rgba(255,60,60,0.1); border-color: rgba(255,60,60,0.3); color: #ff6b6b; }

        /* Responsive */
        @media (max-width: 768px) {
            .header-container { padding: 0 1rem; }
            nav ul { display: none; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <header>
        <div class="header-container">
            <a href="index.html" class="logo">LIFEPOINTS</a>
            
            <div class="header-right">
                <nav>
                    <ul>
                        <li><a href="index.html">INICIO</a></li>
                        <li><a href="sources.html">SOURCES</a></li>
                        <li><a href="#" style="color:var(--primary)">DASHBOARD</a></li>
                    </ul>
                </nav>

                <div class="auth-area" id="authArea">
                    <button id="loginBtn">
                        <i class="fab fa-google"></i> <span>Login</span>
                    </button>
                    <img id="userAvatar" alt="Perfil" title="Ver perfil">
                </div>
            </div>
        </div>
    </header>

    <!-- PANTALLA DE CARGA INICIAL -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- CONTENIDO PRINCIPAL (Oculto hasta login) -->
    <div class="dashboard-container" id="dashboardContent">
        
        <!-- ESTADÍSTICAS -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label"><i class="fas fa-euro-sign"></i> Total Ganado</div>
                <div class="stat-value" id="totalEarned">€0.00</div>
                <div class="stat-subtext">Acumulado histórico</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fas fa-piggy-bank"></i> Saldo Actual</div>
                <div class="stat-value" id="currentBalance">€0.00</div>
                <div class="stat-subtext">Pendiente de retirar</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fab fa-paypal"></i> Retirado</div>
                <div class="stat-value" id="totalWithdrawn">€0.00</div>
                <div class="stat-subtext">Enviado a PayPal</div>
            </div>
            <div class="stat-card">
                <div class="stat-label"><i class="fas fa-chart-line"></i> Tasa de Éxito</div>
                <div class="stat-value" id="successRate">0%</div>
                <div class="stat-subtext" id="successCounts">0 / 0 intentos</div>
            </div>
        </div>

        <!-- GRÁFICA -->
        <div class="chart-section">
            <div class="chart-header">
                <h3><i class="fas fa-chart-area"></i> Evolución de Ganancias</h3>
                <div class="chart-tabs">
                    <button class="chart-tab active" onclick="updateChart('accumulated')">Acumulado</button>
                    <button class="chart-tab" onclick="updateChart('monthly')">Mensual</button>
                </div>
            </div>
            <div style="height: 300px; position: relative;">
                <canvas id="earningsChart"></canvas>
            </div>
        </div>

        <!-- TABLA -->
        <div class="table-section">
            <h3><i class="fas fa-table"></i> Historial Reciente</h3>
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Concepto</th>
                        <th style="text-align: right;">Importe</th>
                    </tr>
                </thead>
                <tbody id="transactionsTable">
                    <!-- Se rellena con JS -->
                </tbody>
            </table>
        </div>

    </div>

    <div id="toast"></div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ═══════════════════════════════════════════════════════════════════
        // CONFIGURACIÓN FIREBASE (PROYECTO LIFEPOINTSDASHBOARD)
        // ═══════════════════════════════════════════════════════════════════
        const firebaseConfig = {
            apiKey: "AIzaSyD9sBTTe9PFQct9Ym9tkiVBr8wYDMl4SI0",
            authDomain: "lifepointsdashboard.firebaseapp.com",
            databaseURL: "https://lifepointsdashboard-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "lifepointsdashboard",
            storageBucket: "lifepointsdashboard.firebasestorage.app",
            messagingSenderId: "70452481394",
            appId: "1:70452481394:web:60e497d37b8b74c2d8a1eb",
            measurementId: "G-P6ZDXEFCDX"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new GoogleAuthProvider();

        // ═══════════════════════════════════════════════════════════════════
        // REFERENCIAS DOM
        // ═══════════════════════════════════════════════════════════════════
        const loginBtn = document.getElementById('loginBtn');
        const userAvatar = document.getElementById('userAvatar');
        const authArea = document.getElementById('authArea');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const dashboardContent = document.getElementById('dashboardContent');
        const toast = document.getElementById('toast');

        let chartInstance = null;
        let surveyData = [];

        // ═══════════════════════════════════════════════════════════════════
        // AUTENTICACIÓN
        // ═══════════════════════════════════════════════════════════════════
        
        // Mostrar área de auth cuando Firebase esté listo
        authArea.classList.add('ready');

        loginBtn.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                showToast("Error al iniciar sesión: " + error.message, true);
            }
        });

        document.getElementById('userAvatar').addEventListener('click', async () => {
            await signOut(auth);
            showToast("Sesión cerrada");
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // USUARIO LOGUEADO
                loginBtn.style.display = 'none';
                userAvatar.style.display = 'block';
                userAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=' + user.displayName;
                
                // Cargar datos privados
                await loadUserData(user.uid);
                
                // Mostrar dashboard
                loadingOverlay.style.display = 'none';
                dashboardContent.classList.add('loaded');

            } else {
                // USUARIO NO LOGUEADO
                loginBtn.style.display = 'inline-flex';
                userAvatar.style.display = 'none';
                
                // Ocultar dashboard y mostrar loading (o mensaje de login)
                dashboardContent.classList.remove('loaded');
                loadingOverlay.style.display = 'flex';
                
                // Limpiar datos
                surveyData = [];
                updateStats();
                document.getElementById('transactionsTable').innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 2rem;">Inicia sesión para ver tus datos</td></tr>';
            }
        });

        // ═══════════════════════════════════════════════════════════════════
        // CARGA DE DATOS (PRIVADA POR USUARIO)
        // ═══════════════════════════════════════════════════════════════════
        function loadUserData(uid) {
            const userRef = ref(db, 'users/' + uid + '/surveys');
            
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                
                if (!data) {
                    surveyData = [];
                    updateStats();
                    renderTable();
                    showToast("Bienvenido. Usa el bot de Telegram para añadir datos.");
                    return;
                }

                // Convertir objeto a array y ordenar
                surveyData = Object.entries(data).map(([key, value]) => ({
                    id: key,
                    ...value,
                    dateObj: new Date(value.fecha)
                })).sort((a, b) => b.dateObj - a.dateObj);

                updateStats();
                renderTable();
                updateChart('accumulated');

            }, (error) => {
                console.error(error);
                showToast("Error de permisos en la base de datos", true);
                loadingOverlay.style.display = 'none';
            });
        }

        // ═══════════════════════════════════════════════════════════════════
        // LÓGICA DEL DASHBOARD
        // ═══════════════════════════════════════════════════════════════════
        function updateStats() {
            let totalEarned = 0;
            let totalWithdrawn = 0;
            let successCount = 0;
            let attemptCount = 0;

            surveyData.forEach(item => {
                const amount = parseFloat(item.importe) || 0;

                if (item.tipo === 'encuesta' || item.tipo === 'bonus') {
                    totalEarned += amount;
                    if(item.tipo === 'encuesta') successCount++;
                    attemptCount++;
                } else if (item.tipo === 'retiro') {
                    totalWithdrawn += amount;
                } else if (item.tipo === 'screener' || item.tipo === 'descalificado') {
                    attemptCount++;
                }
            });

            const balance = totalEarned - totalWithdrawn;
            const rate = attemptCount > 0 ? ((successCount / attemptCount) * 100).toFixed(1) : 0;

            document.getElementById('totalEarned').textContent = '€' + totalEarned.toFixed(2);
            document.getElementById('currentBalance').textContent = '€' + balance.toFixed(2);
            document.getElementById('totalWithdrawn').textContent = '€' + totalWithdrawn.toFixed(2);
            document.getElementById('successRate').textContent = rate + '%';
            document.getElementById('successCounts').textContent = `${successCount} completadas / ${attemptCount} intentos`;
        }

        function renderTable() {
            const tbody = document.getElementById('transactionsTable');
            tbody.innerHTML = '';

            surveyData.slice(0, 10).forEach(item => {
                const dateStr = item.dateObj.toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' });
                const timeStr = item.dateObj.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                
                let badgeClass = 'badge-fail';
                if (item.tipo === 'encuesta') badgeClass = 'badge-encuesta';
                if (item.tipo === 'retiro') badgeClass = 'badge-retiro';
                if (item.tipo === 'bonus') badgeClass = 'badge-bonus';

                const amountClass = (item.tipo === 'retiro' || item.tipo === 'screener') ? 'color: #ff6b6b;' : 'color: var(--success);';
                const sign = (item.tipo === 'retiro') ? '-' : '+';
                const amount = (item.importe > 0) ? `${sign}€${item.importe}` : '€0.00';

                const row = `
                    <tr>
                        <td>
                            <div style="font-weight:600">${dateStr}</div>
                            <div style="font-size:0.75rem; opacity:0.7">${timeStr}</div>
                        </td>
                        <td><span class="badge ${badgeClass}">${item.tipo}</span></td>
                        <td>${item.concepto || '-'}</td>
                        <td style="text-align: right; font-weight: bold; ${amountClass}">${amount}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        window.updateChart = function(mode) {
            // Actualizar botones
            document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const ctx = document.getElementById('earningsChart').getContext('2d');
            
            // Preparar datos
            let labels = [];
            let dataPoints = [];
            let color = '#00f7ff';

            if (mode === 'accumulated') {
                let acc = 0;
                // Filtrar solo ganancias
                const earnings = surveyData.filter(i => i.tipo === 'encuesta' || i.tipo === 'bonus').reverse();
                
                earnings.forEach(i => {
                    acc += parseFloat(i.importe);
                    labels.push(i.dateObj.toLocaleDateString('es-ES', {day:'2-digit', month:'short'}));
                    dataPoints.push(acc);
                });
                color = '#00f7ff';
            } else {
                // Agrupar por mes
                const monthly = {};
                surveyData.filter(i => i.tipo === 'encuesta' || i.tipo === 'bonus').forEach(i => {
                    const key = i.dateObj.toLocaleDateString('es-ES', {month:'short', year:'2-digit'});
                    monthly[key] = (monthly[key] || 0) + parseFloat(i.importe);
                });
                labels = Object.keys(monthly);
                dataPoints = Object.values(monthly);
                color = '#ff00c8';
            }

            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: mode === 'accumulated' ? 'line' : 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Ganancias (€)',
                        data: dataPoints,
                        borderColor: color,
                        backgroundColor: mode === 'accumulated' ? 'rgba(0,247,255,0.1)' : 'rgba(255,0,200,0.2)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#a0a0c0' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#a0a0c0' }
                        }
                    }
                }
            });
        }

        // ═══════════════════════════════════════════════════════════════════
        // UTILIDADES
        // ═══════════════════════════════════════════════════════════════════
        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.className = isError ? 'show error' : 'show';
            setTimeout(() => { toast.className = ''; }, 3000);
        }

        // Tema (opcional, copiado de sources.html)
        const themeToggle = document.createElement('button');
        themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
        themeToggle.style.cssText = "position:fixed; bottom:20px; right:20px; width:40px; height:40px; border-radius:50%; border:none; background:var(--primary); color:#000; cursor:pointer; z-index:1000; display:flex; align-items:center; justify-content:center;";
        themeToggle.onclick = () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            themeToggle.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        };
        document.body.appendChild(themeToggle);

        if(localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }

    </script>
</body>
</html>
