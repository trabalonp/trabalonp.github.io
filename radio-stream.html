<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioStream Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #000000; --bg-main: #121212; --bg-sidebar: #000000;
            --bg-card: #181818; --bg-hover: #282828; --bg-player: #181818;
            --accent: #1db954; --accent-hover: #1ed760;
            --text-1: #ffffff; --text-2: #b3b3b3; --text-3: #6a6a6a;
            --border: #282828; --red: #e63946;
            --radius-sm: 4px; --radius-md: 8px; --transition: all 0.2s ease;
            --player-h: 90px; --mobile-nav-h: 60px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-base); color: var(--text-1); height: 100vh;
            display: grid;
            grid-template-rows: 1fr var(--player-h);
            grid-template-columns: 280px 1fr;
            grid-template-areas: "sidebar main" "player player";
            overflow: hidden;
        }

        /* ══════════════════════════════════
           SIDEBAR
        ══════════════════════════════════ */
        .sidebar { grid-area: sidebar; background: var(--bg-sidebar); display: flex; flex-direction: column; gap: 8px; padding: 8px; overflow: hidden; }
        .sidebar-top { background: var(--bg-main); border-radius: var(--radius-md); padding: 20px 24px; flex-shrink: 0; }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .logo i { font-size: 1.6rem; color: var(--accent); }
        .logo span { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.3px; }
        .nav-item { display: flex; align-items: center; gap: 16px; padding: 8px 0; cursor: pointer; color: var(--text-2); font-weight: 700; font-size: 0.95rem; transition: var(--transition); text-decoration: none; }
        .nav-item:hover, .nav-item.active { color: var(--text-1); }
        .nav-item i { font-size: 1.4rem; width: 28px; }
        .sidebar-library { background: var(--bg-main); border-radius: var(--radius-md); flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        .library-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; flex-shrink: 0; }
        .library-header-left { display: flex; align-items: center; gap: 16px; color: var(--text-2); font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: var(--transition); }
        .library-header-left:hover { color: var(--text-1); }
        .library-header-left i { font-size: 1.4rem; width: 28px; }
        .favorites-scroll { overflow-y: auto; flex: 1; padding: 0 8px 8px 8px; }
        .favorites-scroll::-webkit-scrollbar { width: 8px; } .favorites-scroll::-webkit-scrollbar-track { background: transparent; } .favorites-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .fav-item { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); }
        .fav-item:hover, .fav-item.playing { background: var(--bg-hover); }
        .fav-thumb { width: 48px; height: 48px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; position: relative; background: var(--genre-color); }
        .fav-item.playing .playing-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--accent); }
        .fav-info { overflow: hidden; flex: 1; }
        .fav-name { font-size: 0.95rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .fav-location { font-size: 0.78rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .fav-empty { text-align: left; padding: 16px; color: var(--text-2); background: var(--bg-hover); border-radius: var(--radius-md); margin: 8px 16px; }
        .fav-empty strong { color: var(--text-1); display: block; margin-bottom: 8px; font-size: 0.95rem; }
        .fav-empty p { font-size: 0.82rem; line-height: 1.4; }

        /* ══════════════════════════════════
           MAIN
        ══════════════════════════════════ */
        .main { grid-area: main; background: var(--bg-main); border-radius: var(--radius-md) 0 0 0; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; gap: 16px; background: rgba(10,10,10,0.7); backdrop-filter: blur(20px); flex-shrink: 0; }
        .topbar-nav { display: flex; gap: 8px; }
        .topbar-nav button { width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.7); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .topbar-nav button:hover { background: rgba(0,0,0,0.9); }
        .topbar-nav button:disabled { opacity: 0.4; cursor: default; }
        .search-bar { flex: 1; max-width: 360px; position: relative; }
        .search-bar i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 0.9rem; }
        .search-bar input { width: 100%; background: var(--bg-hover); border: 2px solid transparent; border-radius: 500px; padding: 10px 16px 10px 40px; font-size: 0.9rem; color: var(--text-1); outline: none; transition: var(--transition); font-family: inherit; }
        .search-bar input:hover { border-color: #333; } .search-bar input:focus { border-color: #fff; }
        .topbar-profile { display: flex; align-items: center; gap: 8px; }
        #login-btn { background-color: var(--text-1); color: #000; border: none; padding: 8px 20px; border-radius: 500px; font-weight: 700; cursor: pointer; transition: var(--transition); font-family: inherit; font-size: 0.85rem; }
        #login-btn:hover { transform: scale(1.05); background: #fff; }
        .user-profile { display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.8); padding: 3px 12px 3px 3px; border-radius: 500px; cursor: pointer; transition: var(--transition); }
        .user-profile:hover { background: #000; }
        #user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
        #user-name { font-weight: 700; font-size: 0.82rem; }
        #logout-btn { background: transparent; color: var(--text-2); border: none; padding: 8px; cursor: pointer; transition: var(--transition); font-size: 0.9rem; }
        #logout-btn:hover { color: var(--text-1); transform: scale(1.1); }
        .logged-out .sidebar-library { opacity: 0.5; pointer-events: none; }

        .content { flex: 1; overflow-y: auto; padding: 0 24px 24px; }
        .content::-webkit-scrollbar { width: 10px; } .content::-webkit-scrollbar-track { background: transparent; } .content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }

        /* Views */
        .view-container { display: none; }
        .view-container.active { display: block; }

        .section-title { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 12px; }
        .section-title h2 { font-size: 1.4rem; font-weight: 700; }
        .section-title .see-all { color: var(--text-2); font-size: 0.85rem; font-weight: 700; text-decoration: none; transition: var(--transition); }
        .section-title .see-all:hover { color: var(--text-1); text-decoration: underline; }

        /* Station Grid */
        .stations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 24px; }
        .station-card { background: var(--bg-card); border-radius: var(--radius-md); padding: 16px; cursor: pointer; transition: background 0.3s ease; position: relative; }
        .station-card:hover { background: var(--bg-hover); }
        .station-art { width: 100%; aspect-ratio: 1; border-radius: var(--radius-md); margin-bottom: 16px; position: relative; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); background: var(--genre-color); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .play-overlay { position: absolute; bottom: 8px; right: 8px; width: 48px; height: 48px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: #000; opacity: 0; transform: translateY(8px); transition: all 0.2s ease; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        .station-card:hover .play-overlay { opacity: 1; transform: translateY(0); }
        .station-card-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .station-card-loc { font-size: 0.82rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .card-fav-btn { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.6); border: none; color: var(--text-2); font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: var(--transition); backdrop-filter: blur(4px); }
        .station-card:hover .card-fav-btn, .card-fav-btn.favorited { opacity: 1; }
        .card-fav-btn.favorited { color: var(--accent); } .card-fav-btn:hover { transform: scale(1.1); }

        /* Queue View */
        .queue-header { padding: 24px 0 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
        .queue-header h2 { font-size: 1.5rem; font-weight: 700; }
        .queue-list { display: flex; flex-direction: column; gap: 2px; }
        .queue-item { display: grid; grid-template-columns: 48px 1fr auto; gap: 16px; align-items: center; padding: 8px 12px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); }
        .queue-item:hover { background: var(--bg-hover); }
        .queue-item.playing { background: rgba(29, 185, 84, 0.1); }
        .queue-item-art { width: 40px; height: 40px; border-radius: 4px; background: var(--genre-color); display: flex; align-items: center; justify-content: center; font-size: 1rem; color: #fff; }
        .queue-item.playing .queue-item-art { color: var(--accent); }
        .queue-item-info { overflow: hidden; }
        .queue-item-name { font-size: 0.95rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .queue-item.playing .queue-item-name { color: var(--accent); }
        .queue-item-loc { font-size: 0.82rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .queue-item-duration { font-size: 0.82rem; color: var(--text-2); }

        /* Lyrics View */
        .lyrics-view { text-align: center; padding-top: 40px; }
        .lyrics-art { width: 280px; height: 280px; border-radius: 12px; background: var(--genre-color); margin: 0 auto 32px; display: flex; align-items: center; justify-content: center; font-size: 5rem; box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
        .lyrics-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .lyrics-subtitle { font-size: 1rem; color: var(--text-2); margin-bottom: 32px; }
        .lyrics-live { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(29, 185, 84, 0.1); border-radius: 500px; color: var(--accent); font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; }
        .lyrics-live .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
        .lyrics-empty { color: var(--text-3); font-size: 0.95rem; margin-top: 40px; }

        /* ══════════════════════════════════
           PLAYER
        ══════════════════════════════════ */
        .player { grid-area: player; background: var(--bg-player); border-top: 1px solid var(--border); display: grid; grid-template-columns: 30% 40% 30%; align-items: center; padding: 0 16px; z-index: 100; }
        .player-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .player-art { width: 56px; height: 56px; border-radius: var(--radius-sm); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: var(--bg-card); transition: var(--transition); }
        .player-art:hover { cursor: pointer; }
        .player-info { min-width: 0; flex: 1; }
        .player-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .player-name:hover { text-decoration: underline; cursor: pointer; }
        .player-loc { font-size: 0.75rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .player-heart { background: none; border: none; color: var(--text-2); font-size: 1rem; cursor: pointer; padding: 8px; transition: var(--transition); flex-shrink: 0; }
        .player-heart:hover { color: var(--text-1); }
        .player-heart.favorited { color: var(--accent); }

        .player-center { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .player-btns { display: flex; align-items: center; gap: 16px; }
        .ctrl-btn { background: none; border: none; color: var(--text-2); font-size: 1rem; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .ctrl-btn:hover { color: var(--text-1); }
        .ctrl-btn.active { color: var(--accent); }
        .play-pause-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--text-1); color: #000; font-size: 1rem; border: none; cursor: pointer; transition: transform 0.1s ease; }
        .play-pause-btn:hover { transform: scale(1.06); }
        .play-pause-btn:active { transform: scale(0.98); }
        .live-badge { display: none; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; }
        .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .player-right { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
        .vol-slider { width: 100px; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; outline: none; cursor: pointer; background: linear-gradient(to right, #fff 0%, #fff var(--volume-progress, 80%), #535353 var(--volume-progress, 80%), #535353 100%); transition: background 0.1s; }
        .vol-slider:hover { background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--volume-progress, 80%), #535353 var(--volume-progress, 80%), #535353 100%); }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; opacity: 0; transition: opacity 0.15s; }
        .vol-slider:hover::-webkit-slider-thumb { opacity: 1; }
        .player-btns-mobile { display: none; }

        /* Device Popup */
        .device-popup { position: absolute; bottom: calc(var(--player-h) + 12px); right: 16px; width: 320px; background: #282828; border-radius: var(--radius-md); padding: 20px; box-shadow: 0 16px 24px rgba(0,0,0,0.5); z-index: 200; display: none; }
        .device-popup.visible { display: block; animation: fadeInUp 0.2s ease; }
        .device-popup-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 16px; color: var(--text-1); }
        .device-item { display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.05); }
        .device-icon { font-size: 1.5rem; color: var(--text-1); width: 40px; text-align: center; }
        .device-info-name { font-size: 0.9rem; font-weight: 700; color: var(--text-1); }
        .device-info-sub { font-size: 0.78rem; color: var(--accent); display: flex; align-items: center; gap: 6px; }
        .device-info-sub i { font-size: 0.7rem; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ══════════════════════════════════
           MOBILE
        ══════════════════════════════════ */
        .mobile-nav { display: none; }
        @media (max-width: 1024px) {
            body { grid-template-columns: 240px 1fr; }
            .stations-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
        @media (max-width: 768px) {
            body { grid-template-areas: "main main" "player player"; grid-template-rows: 1fr auto; grid-template-columns: 1fr; padding-bottom: calc(var(--player-h) + var(--mobile-nav-h)); }
            .sidebar { display: none; }
            .player-center, .player-right { display: none; }
            .main { border-radius: 0; margin: 0; } .topbar { border-radius: 0; }
            .player { grid-template-columns: 1fr; position: fixed; bottom: var(--mobile-nav-h); left: 0; width: 100%; z-index: 1000; height: var(--player-h); border: none; background: var(--bg-card); }
            .player-left { justify-content: space-between; }
            .player-btns-mobile { display: flex; align-items: center; gap: 16px; }
            .mobile-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--mobile-nav-h); background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.9)); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; z-index: 1000; border-top: 1px solid var(--border); }
            .mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-3); text-decoration: none; font-size: 0.68rem; font-weight: 600; transition: var(--transition); }
            .mobile-nav-item.active { color: var(--text-1); }
            .mobile-nav-item i { font-size: 1.4rem; }
            .device-popup { display: none !important; }
        }
        @media (max-width: 480px) {
            .stations-grid { gap: 16px; grid-template-columns: repeat(2, 1fr); }
            .player-loc { display: none; }
        }
        ::-webkit-scrollbar { width: 10px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
    </style>
</head>
<body class="logged-out">

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo"><i class="fas fa-broadcast-tower"></i><span>RadioStream</span></div>
            <nav>
                <a class="nav-item active" data-view="home"><i class="fas fa-home"></i> Inicio</a>
                <a class="nav-item" data-view="search"><i class="fas fa-search"></i> Buscar</a>
            </nav>
        </div>
        <div class="sidebar-library">
            <div class="library-header">
                <div class="library-header-left"><i class="fas fa-book"></i> Tu Biblioteca</div>
            </div>
            <div class="favorites-scroll" id="favorites-list">
                <div class="fav-empty"><strong>Crea tu primera playlist</strong><p>¡Es muy fácil! Te vamos a ayudar.</p></div>
            </div>
        </div>
    </aside>

    <main class="main" style="position: relative;">
        <div class="topbar">
            <div class="topbar-nav">
                <button id="btn-back" disabled><i class="fas fa-chevron-left"></i></button>
                <button id="btn-forward" disabled><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="¿Qué quieres escuchar?"></div>
            <div class="topbar-profile">
                <button id="login-btn"><i class="fab fa-google"></i> Iniciar sesión</button>
                <div class="user-profile" id="user-profile"><img id="user-avatar" src="" alt="Avatar"><span id="user-name"></span></div>
                <button id="logout-btn" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <div class="content">
            <!-- HOME VIEW -->
            <div id="view-home" class="view-container active">
                <div class="section-title"><h2>Emisoras destacadas</h2></div>
                <div class="stations-grid" id="stations-grid"></div>
            </div>
            <!-- QUEUE VIEW -->
            <div id="view-queue" class="view-container">
                <div class="queue-header"><h2>Cola de reproducción</h2></div>
                <div class="queue-list" id="queue-list"></div>
            </div>
            <!-- LYRICS VIEW -->
            <div id="view-lyrics" class="view-container">
                <div class="lyrics-view" id="lyrics-content"></div>
            </div>
        </div>

        <!-- DEVICE POPUP -->
        <div class="device-popup" id="device-popup">
            <div class="device-popup-title">Conectar a un dispositivo</div>
            <div class="device-item">
                <div class="device-icon"><i class="fas fa-desktop"></i></div>
                <div>
                    <div class="device-info-name">Navegador Web</div>
                    <div class="device-info-sub"><i class="fas fa-volume-up"></i> <span id="device-status">Reproduciendo</span></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="player">
        <div class="player-left">
            <div class="player-art" id="player-art" title="Ver letra"><i class="fas fa-music"></i></div>
            <div class="player-info">
                <div class="player-name" id="player-name">Selecciona una emisora</div>
                <div class="player-loc" id="player-loc">---</div>
            </div>
            <button class="player-heart" id="player-heart-desktop" title="Me gusta"><i class="fas fa-heart"></i></button>
            <div class="player-btns-mobile">
                <button class="player-heart" id="player-heart-mobile" title="Me gusta"><i class="fas fa-heart"></i></button>
                <button class="ctrl-btn play-pause-btn" id="play-btn-mobile" title="Reproducir"><i class="fas fa-play"></i></button>
            </div>
        </div>
        <div class="player-center">
            <div class="player-btns">
                <button class="ctrl-btn" id="shuffle-btn" title="Aleatorio"><i class="fas fa-random"></i></button>
                <button class="ctrl-btn" id="prev-btn" title="Anterior"><i class="fas fa-step-backward"></i></button>
                <button class="ctrl-btn play-pause-btn" id="play-btn-desktop" title="Reproducir"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" id="next-btn" title="Siguiente"><i class="fas fa-step-forward"></i></button>
                <button class="ctrl-btn" id="repeat-btn" title="Recargar Stream"><i class="fas fa-redo"></i></button>
            </div>
            <div class="live-badge" id="live-badge"><div class="live-dot"></div> EN DIRECTO</div>
        </div>
        <div class="player-right">
            <button class="ctrl-btn" id="lyrics-btn" title="Letra / Info"><i class="fas fa-microphone-alt"></i></button>
            <button class="ctrl-btn" id="queue-btn" title="Cola"><i class="fas fa-list-ul"></i></button>
            <button class="ctrl-btn" id="device-btn" title="Dispositivos"><i class="fas fa-desktop"></i></button>
            <button class="ctrl-btn vol-icon" id="vol-icon" title="Silenciar"><i class="fas fa-volume-up"></i></button>
            <input type="range" min="0" max="100" value="80" class="vol-slider" id="vol-slider">
        </div>
    </footer>

    <nav class="mobile-nav">
        <a href="#" class="mobile-nav-item active" data-view="home"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="#" class="mobile-nav-item" data-view="search"><i class="fas fa-search"></i><span>Buscar</span></a>
        <a href="#" class="mobile-nav-item" data-view="queue"><i class="fas fa-list-ul"></i><span>Cola</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyDCm1pFZLRXk34UIGU3UY0ltLkyHkElsIg", authDomain: "onelife-cec55.firebaseapp.com", databaseURL: "https://onelife-cec55-default-rtdb.europe-west1.firebasedatabase.app", projectId: "onelife-cec55", storageBucket: "onelife-cec55.firebasestorage.app", messagingSenderId: "599128086819", appId: "1:599128086819:web:af149214fe5b68a12ad496" };
        const app = initializeApp(firebaseConfig), auth = getAuth(app), db = getDatabase(app), provider = new GoogleAuthProvider();

        const radioStations = [
            { id: 1, name: "Radio Caroline", location: "Maidstone, UK", genre: ["rock"], streamUrl: "https://radio.caroline.stream/radio-caroline" },
            { id: 2, name: "BBC World Service", location: "London, UK", genre: ["news"], streamUrl: "https://stream.live.vc.bbcmedia.co.uk/bbc_world_service" },
            { id: 3, name: "NPR News", location: "Washington, USA", genre: ["news"], streamUrl: "https://npr-ice.streamguys1.com/live.mp3" },
            { id: 4, name: "WNYC", location: "New York, USA", genre: ["news"], streamUrl: "https://fm939.wnyc.org/wnycfm" },
            { id: 6, name: "BBC Radio 1", location: "London, UK", genre: ["pop"], streamUrl: "https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one" },
            { id: 18, name: "RNE Radio 5", location: "Madrid, ES", genre: ["news"], streamUrl: "https://crtve-ice-edge-2001-fra-eco-cdn.cast.addradio.de/crtve/rne/5/mp3/128/stream.mp3" },
            { id: 19, name: "RNE Radio Clásica", location: "Madrid, ES", genre: ["classical"], streamUrl: "https://crtve-ice-edge-2001-fra-eco-cdn.cast.addradio.de/crtve/rne/2/mp3/128/stream.mp3" },
            { id: 26, name: "Los 40", location: "Madrid, ES", genre: ["pop"], streamUrl: "https://playerservices.streamtheworld.com/api/livestream-redirect/LOS40_SC" },
            { id: 36, name: "Rock FM", location: "Madrid, ES", genre: ["rock"], streamUrl: "https://rockfm-cope-rrcast.flumotion.com/cope/rockfm.mp3" },
            { id: 52, name: "Loca FM", location: "Madrid, ES", genre: ["electronic"], streamUrl: "https://streaming.locafm.com:8443/locafm" },
            { id: 55, name: "Classic FM UK", location: "London, UK", genre: ["classical"], streamUrl: "http://media-ice.musicradio.com/ClassicFMMP3" },
            { id: 58, name: "Sky Radio", location: "Netherlands", genre: ["pop"], streamUrl: "http://playerservices.streamtheworld.com/api/livestream-redirect/SKYRADIO.mp3" },
            { id: 61, name: "Skyrock", location: "Paris, FR", genre: ["hiphop"], streamUrl: "http://icecast.skyrock.net/s/natio_mp3_128k" },
            { id: 69, name: "KEXP 90.3 FM", location: "Seattle, USA", genre: ["rock"], streamUrl: "http://live-mp3-128.kexp.org/kexp128.mp3" },
            { id: 71, name: "SomaFM Groove Salad", location: "USA", genre: ["electronic"], streamUrl: "http://ice1.somafm.com/groovesalad-128-mp3" },
            { id: 72, name: "SomaFM Drone Zone", location: "USA", genre: ["ambient"], streamUrl: "http://ice1.somafm.com/dronezone-128-mp3" },
            { id: 73, name: "Radio Swiss Jazz", location: "Switzerland", genre: ["jazz"], streamUrl: "http://stream.srg-ssr.ch/m/rsj/mp3_128" },
            { id: 81, name: "Ibiza Global Radio", location: "Spain", genre: ["electronic"], streamUrl: "http://ibizaglobalradio.streaming-pro.com:8024/stream" },
            { id: 83, name: "Radio Paradise", location: "USA", genre: ["eclectic"], streamUrl: "http://stream.radioparadise.com/mp3-128" },
            { id: 84, name: "Jazz24", location: "USA", genre: ["jazz"], streamUrl: "http://icy1.abacast.com/kplu-jazz24mp3-128" },
            { id: 86, name: "Hot 108 Jamz", location: "USA", genre: ["hiphop"], streamUrl: "http://sc.hot108.com:4000/stream" }
        ];

        let currentAudio = null, currentStation = null, isPlaying = false, currentUser = null, isShuffle = false;
        let favorites = [], filteredStations = [...radioStations];
        let lastVolume = 80, muted = false;
        let currentView = 'home';
        let viewHistory = ['home'];

        const dom = {
            loginBtn: document.getElementById('login-btn'), logoutBtn: document.getElementById('logout-btn'),
            userProfile: document.getElementById('user-profile'), userAvatar: document.getElementById('user-avatar'), userName: document.getElementById('user-name'),
            volSlider: document.getElementById('vol-slider'), volIcon: document.getElementById('vol-icon'),
            playBtnDesktop: document.getElementById('play-btn-desktop'), playBtnMobile: document.getElementById('play-btn-mobile'),
            heartBtnDesktop: document.getElementById('player-heart-desktop'), heartBtnMobile: document.getElementById('player-heart-mobile'),
            shuffleBtn: document.getElementById('shuffle-btn'), repeatBtn: document.getElementById('repeat-btn'),
            lyricsBtn: document.getElementById('lyrics-btn'), queueBtn: document.getElementById('queue-btn'), deviceBtn: document.getElementById('device-btn'),
            playerArt: document.getElementById('player-art'), playerName: document.getElementById('player-name'), playerLoc: document.getElementById('player-loc'),
            liveBadge: document.getElementById('live-badge'), searchInput: document.getElementById('search-input'),
            btnBack: document.getElementById('btn-back'), btnForward: document.getElementById('btn-forward'),
            devicePopup: document.getElementById('device-popup'), deviceStatus: document.getElementById('device-status')
        };

        /* ── Auth ── */
        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) {
                document.body.classList.remove('logged-out');
                dom.loginBtn.style.display = 'none'; dom.userProfile.style.display = 'flex'; dom.logoutBtn.style.display = 'inline-flex';
                dom.userAvatar.src = user.photoURL; dom.userName.textContent = user.displayName.split(' ')[0];
                loadFavoritesFromFirebase(user.uid); loadVolumeFromFirebase(user.uid);
            } else {
                document.body.classList.add('logged-out');
                dom.loginBtn.style.display = 'inline-flex'; dom.userProfile.style.display = 'none'; dom.logoutBtn.style.display = 'none';
                favorites = []; renderGrid(filteredStations); renderFavorites();
                dom.volSlider.value = 80; updateVolumeUI(80);
            }
        });
        dom.loginBtn.addEventListener('click', () => signInWithPopup(auth, provider).catch(e => console.error(e)));
        dom.logoutBtn.addEventListener('click', () => signOut(auth).catch(e => console.error(e)));

        /* ── Firebase Data ── */
        function loadFavoritesFromFirebase(uid) { onValue(ref(db, `users/${uid}/favorites`), snapshot => { favorites = snapshot.val() ? Object.keys(snapshot.val()).map(Number) : []; renderGrid(filteredStations); renderFavorites(); updatePlayerHeart(); }); }
        function toggleFavorite(id) { if (!currentUser) { alert("Inicia sesión para guardar favoritas."); return; } const favRef = ref(db, `users/${currentUser.uid}/favorites/${id}`); if (favorites.includes(id)) remove(favRef); else set(favRef, true); }
        function loadVolumeFromFirebase(uid) { onValue(ref(db, `users/${uid}/settings/volume`), snapshot => { const savedVolume = snapshot.val(), initialVolume = (savedVolume !== null) ? savedVolume : 80; dom.volSlider.value = initialVolume; lastVolume = initialVolume; muted = initialVolume == 0; if (currentAudio) currentAudio.volume = initialVolume / 100; updateVolumeUI(initialVolume); }); }
        function saveVolumeToFirebase(volume) { if (!currentUser) return; set(ref(db, `users/${currentUser.uid}/settings/volume`), parseInt(volume)); }

        /* ── Volume ── */
        function updateVolumeUI(value) {
            const icon = value == 0 ? 'fa-volume-mute' : (value < 50 ? 'fa-volume-down' : 'fa-volume-up');
            dom.volIcon.querySelector('i').className = `fas ${icon}`;
            dom.volSlider.style.setProperty('--volume-progress', `${value}%`);
        }
        dom.volSlider.addEventListener('input', () => { const newVolume = dom.volSlider.value; if (currentAudio) currentAudio.volume = newVolume / 100; lastVolume = newVolume; muted = newVolume == 0; updateVolumeUI(newVolume); saveVolumeToFirebase(newVolume); });
        dom.volIcon.addEventListener('click', () => { if (muted) { muted = false; dom.volSlider.value = lastVolume > 0 ? lastVolume : 80; } else { muted = true; lastVolume = dom.volSlider.value; dom.volSlider.value = 0; } dom.volSlider.dispatchEvent(new Event('input')); });

        /* ── Views ── */
        function showView(viewId) {
            currentView = viewId;
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');

            // Update nav active state
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.view === viewId);
            });

            dom.searchInput.style.display = (viewId === 'search' || viewId === 'home') ? 'block' : 'none';

            if (viewId === 'lyrics') renderLyrics();
            if (viewId === 'queue') renderQueue();

            dom.btnBack.disabled = viewHistory.length <= 1;
            dom.btnForward.disabled = true;
        }

        function navigateTo(viewId) {
            viewHistory.push(viewId);
            showView(viewId);
        }

        dom.btnBack.addEventListener('click', () => { if (viewHistory.length > 1) { viewHistory.pop(); showView(viewHistory[viewHistory.length - 1]); } });

        document.querySelectorAll('[data-view]').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                navigateTo(item.dataset.view);
                if (item.dataset.view === 'search') dom.searchInput.focus();
            });
        });

        /* ── Device Popup ── */
        dom.deviceBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dom.devicePopup.classList.toggle('visible');
            dom.deviceStatus.textContent = isPlaying ? 'Reproduciendo' : 'Pausado';
        });
        document.addEventListener('click', (e) => { if (!dom.devicePopup.contains(e.target) && e.target !== dom.deviceBtn) { dom.devicePopup.classList.remove('visible'); } });

        /* ── Render Functions ── */
        function renderGrid(stations) {
            const grid = document.getElementById('stations-grid'); if (!grid) return;
            grid.innerHTML = stations.map(s => {
                const fav = favorites.includes(s.id), active = currentStation && currentStation.id === s.id;
                return `<div class="station-card ${active ? 'active' : ''}" data-id="${s.id}">
                    <div class="station-art" style="background:${getGenreColor(s.genre[0])}"><i class="fas fa-music"></i>
                        <button class="play-overlay"><i class="fas ${active && isPlaying ? 'fa-pause' : 'fa-play'}"></i></button>
                    </div>
                    <button class="card-fav-btn ${fav ? 'favorited' : ''}" data-id="${s.id}" title="${fav ? 'Quitar' : 'Añadir'}"><i class="fas fa-heart"></i></button>
                    <div class="station-card-name">${s.name}</div><div class="station-card-loc">${s.location}</div>
                </div>`;
            }).join('');
            grid.querySelectorAll('.station-card').forEach(card => card.addEventListener('click', e => { if (e.target.closest('.card-fav-btn')) return; const station = radioStations.find(s => s.id === parseInt(card.dataset.id)); if (station) handleCardClick(station); }));
            grid.querySelectorAll('.card-fav-btn').forEach(btn => btn.addEventListener('click', () => toggleFavorite(parseInt(btn.dataset.id))));
        }

        function renderFavorites() {
            const list = document.getElementById('favorites-list'); if (!list) return;
            if (!favorites.length) {
                const msg = currentUser ? '<strong>Crea tu primera playlist</strong><p>¡Es muy fácil! Te vamos a ayudar.</p>' : '<strong>Inicia sesión</strong><p>Guarda tus emisoras favoritas.</p>';
                list.innerHTML = `<div class="fav-empty">${msg}</div>`; return;
            }
            list.innerHTML = favorites.map(id => {
                const s = radioStations.find(r => r.id === id); if (!s) return '';
                const active = currentStation && currentStation.id === s.id;
                return `<div class="fav-item ${active ? 'playing' : ''}" data-id="${s.id}">
                    <div class="fav-thumb" style="background:${getGenreColor(s.genre[0])}"><i class="fas fa-music"></i>${active ? '<div class="playing-overlay"><i class="fas fa-volume-up"></i></div>' : ''}</div>
                    <div class="fav-info"><div class="fav-name">${s.name}</div><div class="fav-location">${s.location}</div></div>
                </div>`;
            }).join('');
            list.querySelectorAll('.fav-item').forEach(item => item.addEventListener('click', () => { const station = radioStations.find(s => s.id === parseInt(item.dataset.id)); if (station) handleCardClick(station); }));
        }

        function renderQueue() {
            const list = document.getElementById('queue-list'); if (!list) return;
            list.innerHTML = filteredStations.map(s => {
                const active = currentStation && currentStation.id === s.id;
                return `<div class="queue-item ${active ? 'playing' : ''}" data-id="${s.id}">
                    <div class="queue-item-art" style="background:${getGenreColor(s.genre[0])}"><i class="fas fa-music"></i></div>
                    <div class="queue-item-info"><div class="queue-item-name">${s.name}</div><div class="queue-item-loc">${s.location}</div></div>
                    <div class="queue-item-duration">${s.genre[0].charAt(0).toUpperCase() + s.genre[0].slice(1)}</div>
                </div>`;
            }).join('');
            list.querySelectorAll('.queue-item').forEach(item => item.addEventListener('click', () => { const station = radioStations.find(s => s.id === parseInt(item.dataset.id)); if (station) playStation(station); }));
        }

        function renderLyrics() {
            const content = document.getElementById('lyrics-content'); if (!content) return;
            if (!currentStation) {
                content.innerHTML = `<div class="lyrics-view"><div class="lyrics-art" style="background:#282828"><i class="fas fa-music"></i></div><div class="lyrics-title">No hay nada reproduciéndose</div><div class="lyrics-subtitle">Selecciona una emisora para ver la información aquí.</div></div>`;
                return;
            }
            content.innerHTML = `<div class="lyrics-view">
                <div class="lyrics-art" style="background:${getGenreColor(currentStation.genre[0])}"><i class="fas fa-broadcast-tower"></i></div>
                <div class="lyrics-title">${currentStation.name}</div>
                <div class="lyrics-subtitle">${currentStation.location} • ${currentStation.genre[0].charAt(0).toUpperCase() + currentStation.genre[0].slice(1)}</div>
                <div class="lyrics-live"><div class="live-dot"></div> En directo</div>
                <p class="lyrics-empty">Las letras no están disponibles para emisoras de radio en directo.<br>¡Disfruta de la música!</p>
            </div>`;
        }

        /* ── Player Logic ── */
        function handleCardClick(station) { (currentStation && currentStation.id === station.id) ? togglePlayPause() : playStation(station); }

        function playStation(station) {
            if (currentAudio) currentAudio.pause();
            currentStation = station; isPlaying = true;
            dom.playerArt.style.background = getGenreColor(station.genre[0]);
            dom.playerName.textContent = station.name;
            dom.playerLoc.textContent = station.location;
            dom.liveBadge.style.display = 'flex';
            updatePlayerHeart(); updatePlayBtn();

            currentAudio = new Audio(station.streamUrl);
            currentAudio.volume = dom.volSlider.value / 100;
            currentAudio.play().catch(() => { isPlaying = false; updatePlayBtn(); });
            currentAudio.addEventListener('error', () => { isPlaying = false; updatePlayBtn(); });
            renderGrid(filteredStations); renderFavorites();
            if (currentView === 'lyrics') renderLyrics();
            if (currentView === 'queue') renderQueue();
        }

        function togglePlayPause() {
            if (!currentStation) return;
            if (!currentAudio) { playStation(currentStation); return; }
            isPlaying ? currentAudio.pause() : currentAudio.play().catch(()=>{});
            isPlaying = !isPlaying; updatePlayBtn(); renderGrid(filteredStations);
        }

        function updatePlayBtn() {
            const icon = isPlaying ? 'fa-pause' : 'fa-play';
            dom.playBtnDesktop.innerHTML = `<i class="fas ${icon}"></i>`;
            dom.playBtnMobile.innerHTML = `<i class="fas ${icon}"></i>`;
        }

        function updatePlayerHeart() {
            if (!currentStation) return;
            const isFav = favorites.includes(currentStation.id);
            dom.heartBtnDesktop.classList.toggle('favorited', isFav);
            dom.heartBtnMobile.classList.toggle('favorited', isFav);
        }

        function playAdjacent(dir) {
            if (!currentStation) return;
            if (isShuffle) { playRandom(); return; }
            const currentIndex = filteredStations.findIndex(s => s.id === currentStation.id);
            if (currentIndex === -1) return;
            const nextIndex = (currentIndex + dir + filteredStations.length) % filteredStations.length;
            playStation(filteredStations[nextIndex]);
        }

        function playRandom() {
            if (filteredStations.length < 2) return;
            let randomIndex;
            do { randomIndex = Math.floor(Math.random() * filteredStations.length); } while (filteredStations[randomIndex].id === currentStation?.id);
            playStation(filteredStations[randomIndex]);
        }

        function applyFilters() {
            const search = dom.searchInput.value.toLowerCase().trim();
            filteredStations = radioStations.filter(s => s.name.toLowerCase().includes(search) || s.location.toLowerCase().includes(search));
            renderGrid(filteredStations);
        }

        function getGenreColor(genre) {
            const c = { rock: '#b91c1c', pop: '#7c3aed', news: '#1d4ed8', classical: '#b45309', eclectic: '#0f766e', electronic: '#8b5cf6', hiphop: '#f97316', ambient: '#0891b2', jazz: '#ca8a04' };
            return `linear-gradient(135deg, ${c[genre] || '#374151'}, #121212)`;
        }

        /* ── Event Listeners ── */
        document.addEventListener('DOMContentLoaded', () => {
            renderGrid(filteredStations); updateVolumeUI(dom.volSlider.value);
            dom.searchInput.addEventListener('input', applyFilters);
            dom.playBtnDesktop.addEventListener('click', togglePlayPause);
            dom.playBtnMobile.addEventListener('click', togglePlayPause);
            document.getElementById('prev-btn').addEventListener('click', () => playAdjacent(-1));
            document.getElementById('next-btn').addEventListener('click', () => playAdjacent(1));
            dom.heartBtnDesktop.addEventListener('click', () => { if(currentStation) toggleFavorite(currentStation.id); });
            dom.heartBtnMobile.addEventListener('click', () => { if(currentStation) toggleFavorite(currentStation.id); });
            dom.shuffleBtn.addEventListener('click', () => { isShuffle = !isShuffle; dom.shuffleBtn.classList.toggle('active', isShuffle); });
            dom.repeatBtn.addEventListener('click', () => { if (currentStation) playStation(currentStation); });
            dom.lyricsBtn.addEventListener('click', () => { navigateTo(currentView === 'lyrics' ? (viewHistory.length > 1 ? viewHistory[viewHistory.length-2] : 'home') : 'lyrics'); });
            dom.queueBtn.addEventListener('click', () => { navigateTo(currentView === 'queue' ? (viewHistory.length > 1 ? viewHistory[viewHistory.length-2] : 'home') : 'queue'); });
            dom.playerArt.addEventListener('click', () => { if(currentStation) navigateTo('lyrics'); });
            dom.playerName.addEventListener('click', () => { if(currentStation) navigateTo('lyrics'); });
        });
    </script>
</body>
</html>
