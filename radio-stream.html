<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioStream Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base:    #0a0a0a;
            --bg-sidebar: #111111;
            --bg-card:    #181818;
            --bg-hover:   #282828;
            --bg-player:  #181818;
            --accent:     #1db954;
            --accent-dim: #1aa34a;
            --text-1:     #ffffff;
            --text-2:     #b3b3b3;
            --text-3:     #6a6a6a;
            --border:     #282828;
            --red:        #e63946;
            --radius-sm:  6px;
            --radius-md:  12px;
            --radius-lg:  20px;
            --transition: all 0.2s ease;
            --player-h:   90px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Circular', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg-base);
            color: var(--text-1);
            height: 100vh;
            display: grid;
            grid-template-rows: 1fr var(--player-h);
            grid-template-columns: 280px 1fr;
            grid-template-areas:
                "sidebar main"
                "player  player";
            overflow: hidden;
        }

        /* ══════════════════════════════════
           SIDEBAR
        ══════════════════════════════════ */
        .sidebar {
            grid-area: sidebar;
            background: var(--bg-base);
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            padding: 8px;
        }

        .sidebar-top {
            background: var(--bg-sidebar);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0 20px;
        }

        .logo i { font-size: 1.8rem; color: var(--accent); }

        .logo span {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-2);
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
            text-decoration: none;
        }

        .nav-item:hover { color: var(--text-1); }
        .nav-item.active { color: var(--text-1); }
        .nav-item i { font-size: 1.3rem; width: 24px; }

        /* Sidebar library */
        .sidebar-library {
            background: var(--bg-sidebar);
            border-radius: var(--radius-md);
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            margin-bottom: 12px;
        }

        .library-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-2);
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .library-header-left:hover { color: var(--text-1); }
        .library-header-left i { font-size: 1.2rem; }

        .library-header-right {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: none;
            border: none;
            color: var(--text-2);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .icon-btn:hover { color: var(--text-1); background: var(--bg-hover); }

        .favorites-scroll {
            overflow-y: auto;
            flex: 1;
        }

        .favorites-scroll::-webkit-scrollbar { width: 4px; }
        .favorites-scroll::-webkit-scrollbar-track { background: transparent; }
        .favorites-scroll::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 2px; }

        .fav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .fav-item:hover { background: var(--bg-hover); }
        .fav-item.playing { background: var(--bg-hover); }

        .fav-thumb {
            width: 44px; height: 44px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #1db954, #0d6832);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            position: relative;
        }

        .fav-thumb .playing-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            border-radius: var(--radius-sm);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .fav-item.playing .fav-thumb .playing-overlay { display: flex; }

        .fav-info { overflow: hidden; flex: 1; }

        .fav-name {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-location {
            font-size: 0.75rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-empty {
            text-align: center;
            padding: 30px 10px;
            color: var(--text-3);
        }

        .fav-empty i { font-size: 2rem; margin-bottom: 10px; display: block; }
        .fav-empty p { font-size: 0.82rem; line-height: 1.5; }

        /* ══════════════════════════════════
           MAIN
        ══════════════════════════════════ */
        .main {
            grid-area: main;
            background: var(--bg-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            margin: 8px 8px 0 0;
        }

        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            gap: 16px;
            background: rgba(24,24,24,0.95);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }

        .topbar-nav {
            display: flex;
            gap: 8px;
        }

        .nav-arrow {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: none;
            color: var(--text-1);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .nav-arrow:hover { background: var(--bg-hover); }

        .search-bar {
            flex: 1;
            max-width: 360px;
            position: relative;
        }

        .search-bar i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 0.9rem;
        }

        .search-bar input {
            width: 100%;
            background: var(--text-1);
            border: none;
            border-radius: 500px;
            padding: 10px 16px 10px 40px;
            font-size: 0.9rem;
            color: #000;
            outline: none;
            font-weight: 500;
        }

        .search-bar input::placeholder { color: #6a6a6a; }

        .topbar-filters {
            display: flex;
            gap: 8px;
        }

        .filter-chip {
            padding: 6px 14px;
            border-radius: 500px;
            border: none;
            background: var(--bg-hover);
            color: var(--text-1);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .filter-chip:hover   { background: #333; }
        .filter-chip.active  { background: var(--text-1); color: #000; }

        .topbar-selects {
            display: flex;
            gap: 8px;
        }

        .topbar-select {
            background: var(--bg-hover);
            border: none;
            border-radius: 500px;
            padding: 8px 16px;
            color: var(--text-1);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        .topbar-select option { background: #282828; }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px;
        }

        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 3px; }

        /* Section title */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0 16px;
        }

        .section-title h2 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .section-title a {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-2);
            text-decoration: none;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: var(--transition);
        }

        .section-title a:hover { color: var(--text-1); }

        .station-count {
            font-size: 0.82rem;
            color: var(--text-2);
            font-weight: 400;
        }

        /* Grid */
        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .station-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            group: true;
        }

        .station-card:hover {
            background: var(--bg-hover);
        }

        .station-card.active {
            background: var(--bg-hover);
        }

        .station-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .station-art-bg {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        /* Colores por género */
        .genre-rock     { background: linear-gradient(135deg, #b91c1c, #7f1d1d); }
        .genre-pop      { background: linear-gradient(135deg, #7c3aed, #4c1d95); }
        .genre-news     { background: linear-gradient(135deg, #1d4ed8, #1e3a5f); }
        .genre-classical{ background: linear-gradient(135deg, #b45309, #78350f); }
        .genre-eclectic { background: linear-gradient(135deg, #0f766e, #134e4a); }
        .genre-sports   { background: linear-gradient(135deg, #15803d, #14532d); }
        .genre-christian{ background: linear-gradient(135deg, #9333ea, #581c87); }
        .genre-trance   { background: linear-gradient(135deg, #0ea5e9, #0c4a6e); }
        .genre-variety  { background: linear-gradient(135deg, #ea580c, #7c2d12); }
        .genre-jazz     { background: linear-gradient(135deg, #ca8a04, #713f12); }
        .genre-world    { background: linear-gradient(135deg, #0d9488, #134e4a); }
        .genre-electronic{ background: linear-gradient(135deg, #8b5cf6, #4c1d95); }
        .genre-sertanejo{ background: linear-gradient(135deg, #16a34a, #14532d); }
        .genre-default  { background: linear-gradient(135deg, #374151, #111827); }

        /* Play overlay */
        .play-overlay {
            position: absolute;
            bottom: 8px; right: 8px;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #000;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: none;
            cursor: pointer;
        }

        .station-card:hover .play-overlay,
        .station-card.active .play-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .station-card.active .play-overlay { background: var(--accent); }

        .station-card-name {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-card-loc {
            font-size: 0.78rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .genre-badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 500px;
            background: rgba(255,255,255,0.1);
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* Fav btn inside card */
        .card-fav-btn {
            position: absolute;
            top: 12px; right: 12px;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: none;
            color: var(--text-2);
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }

        .station-card:hover .card-fav-btn { opacity: 1; }
        .card-fav-btn.favorited           { opacity: 1; color: var(--accent); }
        .card-fav-btn:hover               { color: var(--text-1); transform: scale(1.1); }
        .card-fav-btn.favorited:hover     { color: var(--accent); }

        /* No results */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-2);
        }

        .no-results i { font-size: 3rem; margin-bottom: 20px; color: var(--text-3); }
        .no-results h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .no-results p  { font-size: 0.9rem; color: var(--text-3); }

        /* ══════════════════════════════════
           PLAYER BAR
        ══════════════════════════════════ */
        .player {
            grid-area: player;
            background: var(--bg-player);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
        }

        /* Left: now playing info */
        .player-left {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .player-art {
            width: 56px; height: 56px;
            border-radius: var(--radius-sm);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .player-info { min-width: 0; flex: 1; }

        .player-name {
            font-size: 0.88rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-loc {
            font-size: 0.75rem;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-heart {
            background: none;
            border: none;
            color: var(--text-2);
            font-size: 1rem;
            cursor: pointer;
            padding: 6px;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .player-heart:hover          { color: var(--text-1); }
        .player-heart.favorited      { color: var(--accent); }

        /* Center: controls */
        .player-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .player-btns {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-2);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover { color: var(--text-1); }

        .ctrl-btn.secondary { font-size: 0.9rem; }

        .play-pause-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--text-1);
            color: #000;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .play-pause-btn:hover { transform: scale(1.06); background: #e0e0e0; }

        /* Live indicator */
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .live-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        /* Right: volume */
        .player-right {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
        }

        .vol-icon {
            background: none;
            border: none;
            color: var(--text-2);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px;
            transition: var(--transition);
        }

        .vol-icon:hover { color: var(--text-1); }

        .vol-slider {
            width: 100px;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: #535353;
            outline: none;
            cursor: pointer;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--text-1);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .vol-slider:hover::-webkit-slider-thumb { opacity: 1; }

        /* ══════════════════════════════════
           RESPONSIVE
        ══════════════════════════════════ */
        @media (max-width: 1024px) {
            body {
                grid-template-columns: 240px 1fr;
            }
            .stations-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }

        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr var(--player-h);
                grid-template-areas:
                    "sidebar"
                    "main"
                    "player";
            }

            .sidebar {
                flex-direction: row;
                overflow-x: auto;
                padding: 8px;
                height: auto;
            }

            .sidebar-top     { display: flex; align-items: center; gap: 16px; padding: 12px; flex-shrink: 0; }
            .sidebar-library { display: none; }
            .logo            { padding: 0; }

            .main {
                margin: 0 8px;
                border-radius: 0;
            }

            .topbar {
                flex-wrap: wrap;
                gap: 10px;
                padding: 12px;
            }

            .topbar-selects  { display: none; }
            .topbar-filters  { display: none; }
            .search-bar      { max-width: 100%; flex: 1; }

            .stations-grid   { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }

            .player {
                grid-template-columns: auto 1fr auto;
                padding: 0 12px;
            }

            .player-loc   { display: none; }
            .player-right { gap: 6px; }
            .vol-slider   { width: 70px; }
        }

        @media (max-width: 480px) {
            .stations-grid { grid-template-columns: repeat(2, 1fr); }
            .player-right  { display: none; }
        }

        /* ══════════════════════════════════
           LOADING STATE
        ══════════════════════════════════ */
        .loading-card {
            background: var(--bg-hover);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-hover) 25%, #303030 50%, var(--bg-hover) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes skeleton {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ══════════════════════════════════
           SCROLLBAR global
        ══════════════════════════════════ */
        ::-webkit-scrollbar       { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 3px; }
    </style>
</head>
<body>

<!-- ════════════════════════════════════
     SIDEBAR
════════════════════════════════════ -->
<aside class="sidebar">

    <div class="sidebar-top">
        <div class="logo">
            <i class="fas fa-broadcast-tower"></i>
            <span>RadioStream</span>
        </div>

        <nav>
            <a class="nav-item active" href="#">
                <i class="fas fa-home"></i> Inicio
            </a>
            <a class="nav-item" href="#" id="show-favs-mobile">
                <i class="fas fa-heart"></i> Favoritas
            </a>
        </nav>
    </div>

    <div class="sidebar-library">
        <div class="library-header">
            <div class="library-header-left">
                <i class="fas fa-book"></i>
                Tu Biblioteca
            </div>
            <div class="library-header-right">
                <button class="icon-btn" title="Añadir"><i class="fas fa-plus"></i></button>
                <button class="icon-btn" title="Expandir"><i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <div class="favorites-scroll" id="favorites-list">
            <div class="fav-empty">
                <i class="fas fa-heart"></i>
                <p>Tus emisoras favoritas<br>aparecerán aquí</p>
            </div>
        </div>
    </div>

</aside>

<!-- ════════════════════════════════════
     MAIN
════════════════════════════════════ -->
<main class="main">

    <div class="topbar">
        <div class="topbar-nav">

// ══════════════════════════════════════════
//  ESTADO

let currentAudio    = null;
let currentStation  = null;
let isPlaying       = false;
let favorites       = JSON.parse(localStorage.getItem('rs_favorites')) || [];
let filteredStations= [...radioStations];
let activeGenre     = 'all';
let activeLocation  = 'all';
let muted           = false;
let lastVolume      = 80;

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
const genreEmoji = {
    rock:'🎸', pop:'🎤', news:'📰', classical:'🎻',
    eclectic:'🎵', sports:'⚽', christian:'✝️', trance:'🎧',
    variety:'🌟', jazz:'🎷', world:'🌍', electronic:'💿',
    sertanejo:'🤠', default:'📻'
};

const genreClass = {
    rock:'genre-rock', pop:'genre-pop', news:'genre-news',
    classical:'genre-classical', eclectic:'genre-eclectic',
    sports:'genre-sports', christian:'genre-christian', trance:'genre-trance',
    variety:'genre-variety', jazz:'genre-jazz', world:'genre-world',
    electronic:'genre-electronic', sertanejo:'genre-sertanejo'
};

function getGenreClass(genres) {
    return genreClass[genres[0]] || 'genre-default';
}

function getGenreEmoji(genres) {
    return genreEmoji[genres[0]] || genreEmoji.default;
}

function isFav(id) { return favorites.includes(id); }

// ══════════════════════════════════════════
//  RENDER GRID
// ══════════════════════════════════════════
function renderGrid(stations) {
    const grid = document.getElementById('stations-grid');
    const count = document.getElementById('station-count');
    count.textContent = `${stations.length} emisora${stations.length !== 1 ? 's' : ''}`;

    if (!stations.length) {
        grid.innerHTML = `
            <div class="no-results">
                <i class="fas fa-search"></i>
                <h3>Sin resultados</h3>
                <p>Prueba con otro término o cambia los filtros</p>
            </div>`;
        return;
    }

    grid.innerHTML = stations.map(s => {
        const cls   = getGenreClass(s.genre);
        const emoji = getGenreEmoji(s.genre);
        const fav   = isFav(s.id);
        const active= currentStation && currentStation.id === s.id;

        return `
        <div class="station-card ${active ? 'active' : ''}" data-id="${s.id}">
            <div class="station-art ${cls}">
                <div class="station-art-bg">${emoji}</div>
                <button class="play-overlay" data-id="${s.id}">
                    <i class="fas ${active && isPlaying ? 'fa-pause' : 'fa-play'}"></i>
                </button>
            </div>
            <button class="card-fav-btn ${fav ? 'favorited' : ''}" data-id="${s.id}" title="${fav ? 'Quitar de favoritos' : 'Añadir a favoritos'}">
                <i class="fas fa-heart"></i>
            </button>
            <div class="station-card-name">${s.name}</div>
            <div class="station-card-loc">${s.location}</div>
            <div class="station-card-tags">
                ${s.genre.map(g => `<span class="genre-badge">${g}</span>`).join('')}
            </div>
        </div>`;
    }).join('');

    // Events
    grid.querySelectorAll('.station-card').forEach(card => {
        card.addEventListener('click', e => {
            if (e.target.closest('.card-fav-btn')) return;
            const id = parseInt(card.dataset.id);
            const station = radioStations.find(s => s.id === id);
            if (station) handleCardClick(station);
        });
    });

    grid.querySelectorAll('.card-fav-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            toggleFavorite(parseInt(btn.dataset.id));
        });
    });
}

function handleCardClick(station) {
    if (currentStation && currentStation.id === station.id) {
        togglePlayPause();
    } else {
        playStation(station);
    }
}

// ══════════════════════════════════════════
//  RENDER FAVORITES SIDEBAR
// ══════════════════════════════════════════
function renderFavorites() {
    const list = document.getElementById('favorites-list');

    if (!favorites.length) {
        list.innerHTML = `
            <div class="fav-empty">
                <i class="fas fa-heart"></i>
                <p>Tus emisoras favoritas<br>aparecerán aquí</p>
            </div>`;
        return;
    }

    list.innerHTML = favorites.map(id => {
        const s = radioStations.find(r => r.id === id);
        if (!s) return '';
        const active = currentStation && currentStation.id === s.id;
        const cls    = getGenreClass(s.genre);
        const emoji  = getGenreEmoji(s.genre);

        return `
        <div class="fav-item ${active ? 'playing' : ''}" data-id="${s.id}">
            <div class="fav-thumb ${cls}">
                ${emoji}
                <div class="playing-overlay">
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>
            <div class="fav-info">
                <div class="fav-name">${s.name}</div>
                <div class="fav-location">${s.location}</div>
            </div>
        </div>`;
    }).join('');

    list.querySelectorAll('.fav-item').forEach(item => {
        item.addEventListener('click', () => {
            const id = parseInt(item.dataset.id);
            const station = radioStations.find(s => s.id === id);
            if (station) handleCardClick(station);
        });
    });
}

// ══════════════════════════════════════════
//  PLAYER
// ══════════════════════════════════════════
function playStation(station) {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
    }

    currentStation = station;
    isPlaying      = true;

    // Update player UI
    const cls   = getGenreClass(station.genre);
    const emoji = getGenreEmoji(station.genre);

    document.getElementById('player-art').className  = `player-art ${cls}`;
    document.getElementById('player-art').innerHTML  = emoji;
    document.getElementById('player-name').textContent = station.name;
    document.getElementById('player-loc').textContent  = station.location;
    document.getElementById('live-badge').style.display = 'flex';

    updatePlayerHeart();
    updatePlayBtn();

    // Audio
    currentAudio = new Audio(station.streamUrl);
    currentAudio.volume = document.getElementById('vol-slider').value / 100;
    currentAudio.play().catch(() => {
        isPlaying = false;
        updatePlayBtn();
    });

    currentAudio.addEventListener('error', () => {
        isPlaying = false;
        updatePlayBtn();
    });

    // Re-render to update active states
    renderGrid(filteredStations);
    renderFavorites();
}

function togglePlayPause() {
    if (!currentStation) return;

    if (!currentAudio) {
        playStation(currentStation);
        return;
    }

    if (isPlaying) {
        currentAudio.pause();
        isPlaying = false;
    } else {
        currentAudio.play().catch(() => {});
        isPlaying = true;
    }

    updatePlayBtn();
    renderGrid(filteredStations);
}

function updatePlayBtn() {
    const btn = document.getElementById('play-btn');
    btn.innerHTML = isPlaying
        ? '<i class="fas fa-pause"></i>'
        : '<i class="fas fa-play"></i>';
}

function updatePlayerHeart() {
    if (!currentStation) return;
    const btn = document.getElementById('player-heart');
    const fav  = isFav(currentStation.id);
    btn.classList.toggle('favorited', fav);
}

// ══════════════════════════════════════════
//  FAVORITES
// ══════════════════════════════════════════
function toggleFavorite(id) {
    const idx = favorites.indexOf(id);
    if (idx > -1) {
        favorites.splice(idx, 1);
    } else {
        favorites.push(id);
    }
    localStorage.setItem('rs_favorites', JSON.stringify(favorites));
    renderGrid(filteredStations);
    renderFavorites();
    updatePlayerHeart();
}

// ══════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════
function applyFilters() {
    const search = document.getElementById('search-input').value.toLowerCase().trim();

    filteredStations = radioStations.filter(s => {
        // Search
        if (search && !s.name.toLowerCase().includes(search) &&
                      !s.location.toLowerCase().includes(search)) return false;

        // Genre chip
        if (activeGenre !== 'all' && !s.genre.includes(activeGenre)) return false;

        // Location
        if (activeLocation !== 'all') {
            const loc = s.location.toLowerCase();
            const map = {
                spain:       ['spain','españa'],
                uk:          ['united kingdom','reino unido'],
                france:      ['france','francia'],
                germany:     ['germany','alemania'],
                usa:         ['usa','united states'],
                latin:       ['argentina','mexico','colombia','chile','peru','bolivia','venezuela'],
                netherlands: ['netherlands','países bajos'],
                australia:   ['australia'],
                denmark:     ['denmark','dinamarca'],
                brazil:      ['brazil','brasil'],
                italy:       ['italy','italia'],
            };
            const terms = map[activeLocation] || [];
            if (!terms.some(t => loc.includes(t))) return false;
        }

        return true;
    });

    // Update heading
    const heading = document.getElementById('section-heading');
    if (search) {
        heading.textContent = `Resultados para "${search}"`;
    } else if (activeGenre !== 'all') {
        heading.textContent = `Emisoras de ${activeGenre}`;
    } else if (activeLocation !== 'all') {
        heading.textContent = `Emisoras por país`;
    } else {
        heading.textContent = 'Emisoras destacadas';
    }

    renderGrid(filteredStations);
}

// Prev / Next
function playAdjacent(dir) {
    if (!currentStation) return;
    const idx  = filteredStations.findIndex(s => s.id === currentStation.id);
    const next = (idx + dir + filteredStations.length) % filteredStations.length;
    if (filteredStations[next]) playStation(filteredStations[next]);
}

// ══════════════════════════════════════════
//  VOLUME
// ══════════════════════════════════════════
function syncVolume(val) {
    if (currentAudio) currentAudio.volume = val / 100;
    const icon = document.getElementById('vol-icon').querySelector('i');
    if (val == 0)       icon.className = 'fas fa-volume-mute';
    else if (val < 50)  icon.className = 'fas fa-volume-down';
    else                icon.className = 'fas fa-volume-up';
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {

    renderGrid(filteredStations);
    renderFavorites();

    // Search
    document.getElementById('search-input').addEventListener('input', applyFilters);

    // Genre chips
    document.getElementById('genre-filters').addEventListener('click', e => {
        const chip = e.target.closest('.filter-chip');
        if (!chip) return;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeGenre = chip.dataset.genre;
        applyFilters();
    });

    // Location select
    document.getElementById('location-select').addEventListener('change', e => {
        activeLocation = e.target.value;
        applyFilters();
    });

    // Player controls
    document.getElementById('play-btn').addEventListener('click', togglePlayPause);
    document.getElementById('prev-btn').addEventListener('click', () => playAdjacent(-1));
    document.getElementById('next-btn').addEventListener('click', () => playAdjacent(1));

    // Volume
    const volSlider = document.getElementById('vol-slider');
    volSlider.addEventListener('input', () => {
        lastVolume = +volSlider.value;
        muted = lastVolume === 0;
        syncVolume(lastVolume);
    });

    document.getElementById('vol-icon').addEventListener('click', () => {
        if (muted) {
            muted = false;
            volSlider.value = lastVolume || 80;
            syncVolume(volSlider.value);
        } else {
            muted = true;
            lastVolume = +volSlider.value;
            volSlider.value = 0;
            syncVolume(0);
        }
    });

    // Player heart
    document.getElementById('player-heart').addEventListener('click', () => {
        if (currentStation) toggleFavorite(currentStation.id);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space') { e.preventDefault(); togglePlayPause(); }
        if (e.code === 'ArrowRight') playAdjacent(1);
        if (e.code === 'ArrowLeft')  playAdjacent(-1);
    });
});
</script>
</body>
</html>
