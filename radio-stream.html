<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RadioStream Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [INICIO] TU CSS ORIGINAL (CON ALGUNAS ADICIONES) */
        :root {
            --bg-base: #0a0a0a;
            --bg-sidebar: #111111;
            --bg-card: #181818;
            --bg-hover: #282828;
            --bg-player: #181818;
            --accent: #1db954;
            --accent-dim: #1aa34a;
            --text-1: #ffffff;
            --text-2: #b3b3b3;
            --text-3: #6a6a6a;
            --border: #282828;
            --red: #e63946;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.2s ease;
            --player-h: 90px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Circular', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg-base);
            color: var(--text-1);
            height: 100vh;
            display: grid;
            grid-template-rows: 1fr var(--player-h);
            grid-template-columns: 280px 1fr;
            grid-template-areas:
                "sidebar main"
                "player player";
            overflow: hidden;
        }
        
        /* --- NUEVOS ESTILOS PARA LOGIN/PERFIL --- */
        .topbar-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        #login-btn {
            background-color: var(--text-1);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 500px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: none; /* Oculto por defecto */
        }
        #login-btn:hover {
            transform: scale(1.05);
        }
        
        .user-profile {
            display: none; /* Oculto por defecto */
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            padding: 4px;
            border-radius: 500px;
            cursor: pointer;
            transition: var(--transition);
        }
        .user-profile:hover {
            background: var(--bg-hover);
        }

        #user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        #user-name {
            font-weight: 700;
            font-size: 0.85rem;
            padding-right: 8px;
        }

        #logout-btn {
            background: var(--red);
            color: var(--text-1);
            border: none;
            padding: 8px 16px;
            border-radius: 500px;
            font-weight: 700;
            cursor: pointer;
            margin-left: 8px;
            transition: var(--transition);
            display: none; /* Oculto por defecto */
        }
        #logout-btn:hover {
            opacity: 0.8;
        }
        
        /* Ocultar elementos cuando no hay sesión */
        .logged-out .sidebar-library {
            opacity: 0.5;
            pointer-events: none;
        }
        .logged-out .fav-empty p {
            content: 'Inicia sesión para guardar tus favoritas.';
        }
        /* [FIN] TU CSS ORIGINAL (CON ADICIONES) */


        /* --- RESTO DE TU CSS ORIGINAL (SIN CAMBIOS) --- */

        /* SIDEBAR */
        .sidebar {
            grid-area: sidebar;
            background: var(--bg-base);
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            padding: 8px;
        }

        .sidebar-top {
            background: var(--bg-sidebar);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0 20px;
        }
        .logo i {font-size: 1.8rem; color: var(--accent); }
        .logo span {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-2);
            font-weight: 700;
            font-size: 0.9rem;
            transition: var(--transition);
            text-decoration: none;
        }
        .nav-item:hover { color: var(--text-1); }
        .nav-item.active { color: var(--text-1); }
        .nav-item i { font-size: 1.3rem; width: 24px; }
        
        .sidebar-library {
            background: var(--bg-sidebar);
            border-radius: var(--radius-md);
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 4px;
            margin-bottom: 12px;
        }
        .library-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-2);
            font-weight: 700;
            font-size: 0.9rem;
        }
        .library-header-left i { font-size: 1.2rem; }
        
        .favorites-scroll {
            overflow-y: auto;
            flex: 1;
        }
        .favorites-scroll::-webkit-scrollbar { width: 4px; }
        .favorites-scroll::-webkit-scrollbar-track { background: transparent; }
        .favorites-scroll::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 2px; }

        .fav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }
        .fav-item:hover, .fav-item.playing { background: var(--bg-hover); }
        
        .fav-thumb {
            width: 44px; height: 44px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #1db954, #0d6832);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            position: relative;
        }
        .fav-item.playing .playing-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            color: var(--accent);
        }
        .fav-info { overflow: hidden; flex: 1; }
        .fav-name { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .fav-location { font-size: 0.75rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .fav-empty { text-align: center; padding: 30px 10px; color: var(--text-3); }
        .fav-empty i { font-size: 2rem; margin-bottom: 10px; display: block; }
        .fav-empty p { font-size: 0.82rem; line-height: 1.5; }

        /* MAIN */
        .main {
            grid-area: main;
            background: var(--bg-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            margin: 8px 8px 0 0;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            gap: 16px;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }
        
        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .search-bar {
            flex: 1;
            max-width: 360px;
            position: relative;
        }
        .search-bar i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: 0.9rem;
        }
        .search-bar input {
            width: 100%;
            background: var(--bg-hover);
            border: none;
            border-radius: 500px;
            padding: 10px 16px 10px 40px;
            font-size: 0.9rem;
            color: var(--text-1);
            outline: none;
            font-weight: 500;
        }
        .search-bar input::placeholder { color: #888; }
        
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 24px;
        }
        .content::-webkit-scrollbar { width: 6px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 3px; }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 0 16px;
        }
        .section-title h2 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.3px; }
        .station-count { font-size: 0.82rem; color: var(--text-2); font-weight: 400; }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }
        .station-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .station-card:hover, .station-card.active { background: var(--bg-hover); }
        .station-art {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-sm);
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .station-art-bg {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        
        .genre-rock { background: linear-gradient(135deg, #b91c1c, #7f1d1d); }
        .genre-pop { background: linear-gradient(135deg, #7c3aed, #4c1d95); }
        .genre-news { background: linear-gradient(135deg, #1d4ed8, #1e3a5f); }
        .genre-classical { background: linear-gradient(135deg, #b45309, #78350f); }
        .genre-eclectic { background: linear-gradient(135deg, #0f766e, #134e4a); }
        .genre-sports { background: linear-gradient(135deg, #15803d, #14532d); }
        .genre-electronic { background: linear-gradient(135deg, #8b5cf6, #4c1d95); }
        .genre-hiphop { background: linear-gradient(135deg, #f97316, #b45309); }
        .genre-ambient { background: linear-gradient(135deg, #0891b2, #164e63); }
        .genre-jazz { background: linear-gradient(135deg, #ca8a04, #713f12); }
        .genre-default {background: linear-gradient(135deg, #374151, #111827); }

        .play-overlay {
            position: absolute;
            bottom: 8px; right: 8px;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #000;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .station-card:hover .play-overlay,
        .station-card.active .play-overlay {
            opacity: 1;
            transform: translateY(0);
        }
        
        .station-card-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .station-card-loc { font-size: 0.78rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        
        .card-fav-btn {
            position: absolute;
            top: 12px; right: 12px;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: none;
            color: var(--text-2);
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }
        .station-card:hover .card-fav-btn { opacity: 1; }
        .card-fav-btn.favorited { opacity: 1; color: var(--accent); }
        .card-fav-btn:hover { color: var(--text-1); transform: scale(1.1); }
        .card-fav-btn.favorited:hover { color: var(--accent); }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-2);
        }
        .no-results i { font-size: 3rem; margin-bottom: 20px; color: var(--text-3); }
        .no-results h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .no-results p { font-size: 0.9rem; color: var(--text-3); }

        /* PLAYER BAR */
        .player {
            grid-area: player;
            background: var(--bg-player);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
        }
        .player-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .player-art { width: 56px; height: 56px; border-radius: var(--radius-sm); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
        .player-info { min-width: 0; flex: 1; }
        .player-name { font-size: 0.88rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .player-loc { font-size: 0.75rem; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow:ellipsis; }
        .player-heart { background: none; border: none; color: var(--text-2); font-size: 1rem; cursor: pointer; padding: 6px; transition: var(--transition); flex-shrink: 0; }
        .player-heart:hover { color: var(--text-1); }
        .player-heart.favorited { color: var(--accent); }
        .player-center { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .player-btns { display: flex; align-items: center; gap: 20px; }
        .ctrl-btn { background: none; border: none; color: var(--text-2); font-size: 1rem; cursor: pointer; padding: 4px; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { color: var(--text-1); }
        .ctrl-btn.secondary { font-size: 0.9rem; }
        .play-pause-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--text-1); color: #000; border: none; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .play-pause-btn:hover { transform: scale(1.06); background: #e0e0e0; }
        .live-badge { display: none; align-items: center; gap: 5px; font-size: 0.7rem; font-weight: 800; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; }
        .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
        .player-right { display: flex; align-items: center; gap: 10px; justify-content: flex-end; }
        .vol-icon { background: none; border: none; color: var(--text-2); font-size: 0.9rem; cursor: pointer; padding: 4px; transition: var(--transition); }
        .vol-icon:hover { color: var(--text-1); }
        .vol-slider { width: 100px; -webkit-appearance: none; height: 4px; border-radius: 2px; background: #535353; outline: none; cursor: pointer; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--text-1); cursor: pointer; opacity: 0; transition: opacity 0.15s; }
        .vol-slider:hover::-webkit-slider-thumb { opacity: 1; }

        /* RESPONSIVE */
        @media (max-width: 1024px) { body { grid-template-columns: 240px 1fr; } .stations-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); } }
        @media (max-width: 768px) { body { grid-template-columns: 1fr; grid-template-rows: auto 1fr var(--player-h); grid-template-areas: "sidebar" "main" "player"; } .sidebar { flex-direction: row; overflow-x: auto; padding: 8px; height: auto; } .sidebar-top { display: flex; align-items: center; gap: 16px; padding: 12px; flex-shrink: 0; } .sidebar-library { display: none; } .logo { padding: 0; } .main { margin: 0 8px; border-radius: 0; } .topbar { flex-wrap: wrap; gap: 10px; padding: 12px; } .search-bar {max-width: 100%; flex: 1; } .player { grid-template-columns: auto 1fr auto; padding: 0 12px; } .player-loc {display: none; } .player-right { gap: 6px; } .vol-slider { width: 70px; } }
        @media (max-width: 480px) { .stations-grid {grid-template-columns: repeat(2, 1fr); } .player-right { display: none; } }
        
        /* SCROLLBAR GLOBAL */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 3px; }
    </style>
</head>

        // --- ESTADO DE LA APLICACIÓN ---
        let currentAudio = null;
        let currentStation = null;
        let isPlaying = false;
        let favorites = []; // Ahora se carga desde Firebase
        let filteredStations = [...radioStations];
        let currentUser = null;

        // --- DOM ELEMENTS ---
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userProfile = document.getElementById('user-profile');
        const userAvatar = document.getElementById('user-avatar');
        const userName = document.getElementById('user-name');
        const body = document.body;
        
        // --- AUTENTICACIÓN ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuario ha iniciado sesión
                currentUser = user;
                body.classList.remove('logged-out');
                body.classList.add('logged-in');
                loginBtn.style.display = 'none';
                userProfile.style.display = 'flex';
                logoutBtn.style.display = 'inline-block';
                userAvatar.src = user.photoURL;
                userName.textContent = user.displayName.split(' ')[0];
                
                loadFavoritesFromFirebase(user.uid);
            } else {
                // Usuario ha cerrado sesión
                currentUser = null;
                body.classList.remove('logged-in');
                body.classList.add('logged-out');
                loginBtn.style.display = 'inline-block';
                userProfile.style.display = 'none';
                logoutBtn.style.display = 'none';
                
                favorites = [];
                renderGrid(filteredStations);
                renderFavorites();
            }
        });

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider).catch(error => console.error("Error en login:", error));
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth).catch(error => console.error("Error en logout:", error));
        });

        // --- LÓGICA DE FAVORITOS CON FIREBASE ---
        function loadFavoritesFromFirebase(uid) {
            const favsRef = ref(db, `users/${uid}/favorites`);
            onValue(favsRef, (snapshot) => {
                const data = snapshot.val();
                favorites = data ? Object.keys(data).map(Number) : [];
                renderGrid(filteredStations);
                renderFavorites();
                if (currentStation) updatePlayerHeart();
            });
        }
        
        function toggleFavorite(id) {
            if (!currentUser) {
                alert("Por favor, inicia sesión para guardar tus favoritas.");
                return;
            }
            const favRef = ref(db, `users/${currentUser.uid}/favorites/${id}`);
            if (favorites.includes(id)) {
                // Eliminar de favoritos
                remove(favRef);
            } else {
                // Añadir a favoritos
                set(favRef, true);
            }
        }
        
        // --- RESTO DE TU LÓGICA JS (AJUSTADA) ---
        
        // --- RENDERIZADO ---
        function renderGrid(stations) {
            const grid = document.getElementById('stations-grid');
            document.getElementById('station-count').textContent = `${stations.length} emisora${stations.length !== 1 ? 's' : ''}`;
            if (!stations.length) {
                grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><h3>Sin resultados</h3><p>Prueba con otro término de búsqueda</p></div>`;
                return;
            }
            grid.innerHTML = stations.map(s => {
                const fav = favorites.includes(s.id);
                const active = currentStation && currentStation.id === s.id;
                return `
                <div class="station-card ${active ? 'active' : ''}" data-id="${s.id}">
                    <div class="station-art genre-${s.genre[0] || 'default'}">
                        <div class="station-art-bg"><i class="fas fa-music"></i></div>
                        <button class="play-overlay"><i class="fas ${active && isPlaying ? 'fa-pause' : 'fa-play'}"></i></button>
                    </div>
                    <button class="card-fav-btn ${fav ? 'favorited' : ''}" data-id="${s.id}" title="${fav ? 'Quitar de favoritos' : 'Añadir a favoritos'}">
                        <i class="fas fa-heart"></i>
                    </button>
                    <div class="station-card-name">${s.name}</div>
                    <div class="station-card-loc">${s.location}</div>
                </div>`;
            }).join('');
            
            grid.querySelectorAll('.station-card').forEach(card => card.addEventListener('click', (e) => {
                if (e.target.closest('.card-fav-btn')) return;
                const station = radioStations.find(s => s.id === parseInt(card.dataset.id));
                if (station) handleCardClick(station);
            }));
            grid.querySelectorAll('.card-fav-btn').forEach(btn => btn.addEventListener('click', () => {
                toggleFavorite(parseInt(btn.dataset.id));
            }));
        }

        function renderFavorites() {
            const list = document.getElementById('favorites-list');
            if (!favorites.length) {
                const message = currentUser ? 'Añade emisoras a tus favoritas' : 'Inicia sesión para ver<br>tus emisoras favoritas';
                list.innerHTML = `<div class="fav-empty"><i class="fas fa-heart"></i><p>${message}</p></div>`;
                return;
            }
            list.innerHTML = favorites.map(id => {
                const s = radioStations.find(r => r.id === id);
                if (!s) return '';
                const active = currentStation && currentStation.id === s.id;
                return `
                <div class="fav-item ${active ? 'playing' : ''}" data-id="${s.id}">
                    <div class="fav-thumb genre-${s.genre[0] || 'default'}">
                        <i class="fas fa-music"></i>
                        ${active ? '<div class="playing-overlay"><i class="fas fa-volume-up"></i></div>' : ''}
                    </div>
                    <div class="fav-info">
                        <div class="fav-name">${s.name}</div>
                        <div class="fav-location">${s.location}</div>
                    </div>
                </div>`;
            }).join('');

            list.querySelectorAll('.fav-item').forEach(item => item.addEventListener('click', () => {
                const station = radioStations.find(s => s.id === parseInt(item.dataset.id));
                if (station) handleCardClick(station);
            }));
        }
        
        // --- LÓGICA DEL REPRODUCTOR ---
        function handleCardClick(station) {
            if (currentStation && currentStation.id === station.id) {
                togglePlayPause();
            } else {
                playStation(station);
            }
        }
        
        function playStation(station) {
            if (currentAudio) currentAudio.pause();
            currentStation = station;
            isPlaying = true;
            
            document.getElementById('player-art').className = `player-art genre-${station.genre[0] || 'default'}`;
            document.getElementById('player-art').innerHTML = '<i class="fas fa-music"></i>';
            document.getElementById('player-name').textContent = station.name;
            document.getElementById('player-loc').textContent = station.location;
            document.getElementById('live-badge').style.display = 'inline-flex';
            
            updatePlayerHeart();
            updatePlayBtn();
            
            currentAudio = new Audio(station.streamUrl);
            currentAudio.volume = document.getElementById('vol-slider').value / 100;
            currentAudio.play().catch(() => { isPlaying = false; updatePlayBtn(); });
            currentAudio.addEventListener('error', () => { isPlaying = false; updatePlayBtn(); });
            
            renderGrid(filteredStations);
            renderFavorites();
        }

        function togglePlayPause() {
            if (!currentStation) return;
            if (!currentAudio) { playStation(currentStation); return; }
            if (isPlaying) {
                currentAudio.pause();
                isPlaying = false;
            } else {
                currentAudio.play().catch(() => {});
                isPlaying = true;
            }
            updatePlayBtn();
            renderGrid(filteredStations);
        }

        function updatePlayBtn() {
            document.getElementById('play-btn').innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        }

        function updatePlayerHeart() {
            const btn = document.getElementById('player-heart');
            if (!currentStation) {
                btn.classList.remove('favorited');
                return;
            };
            const fav = favorites.includes(currentStation.id);
            btn.classList.toggle('favorited', fav);
        }
        
        // --- FILTROS Y EVENTOS ---
        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase().trim();
            filteredStations = radioStations.filter(s => {
                return (s.name.toLowerCase().includes(search) || s.location.toLowerCase().includes(search));
            });
            renderGrid(filteredStations);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderGrid(filteredStations);

            document.getElementById('search-input').addEventListener('input', applyFilters);
            document.getElementById('play-btn').addEventListener('click', togglePlayPause);
            document.getElementById('player-heart').addEventListener('click', () => {
                if(currentStation) toggleFavorite(currentStation.id);
            });
            // ... (resto de tus listeners)
        });

    </script>
