<script type="module">
// ══════════════════════════════════════════════
// IMPORTS FIREBASE (versión modular)
// ══════════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup, 
  signOut,
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getDatabase, 
  ref, 
  onValue 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ══════════════════════════════════════════════
// CONFIGURACIÓN FIREBASE
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyD9sBTTe9PFQct9Ym9tkiVBr8wYDMl4SI0",
  authDomain: "lifepointsdashboard.firebaseapp.com",
  databaseURL: "https://lifepointsdashboard-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lifepointsdashboard",
  storageBucket: "lifepointsdashboard.firebasestorage.app",
  messagingSenderId: "70452481394",
  appId: "1:70452481394:web:60e497d37b8b74c2d8a1eb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

// ══════════════════════════════════════════════
// ELEMENTOS DOM
// ══════════════════════════════════════════════
const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const userNameSpan = document.getElementById('userName');

// ══════════════════════════════════════════════
// CREAR PANTALLA DE LOGIN (si no existe)
// ══════════════════════════════════════════════
if (!loginScreen) {
  const screen = document.createElement('div');
  screen.id = 'loginScreen';
  screen.style.cssText = `
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  `;
  screen.innerHTML = `
    <h1 style="color: white; font-size: 3em; margin-bottom: 20px;">🎯 Survey Dashboard</h1>
    <p style="color: white; font-size: 1.2em; margin-bottom: 30px;">Inicia sesión para ver tus datos</p>
    <button id="loginBtn" style="
      background: white;
      color: #667eea;
      border: none;
      padding: 15px 40px;
      font-size: 1.2em;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    ">🔐 Login con Google</button>
  `;
  document.body.insertBefore(screen, document.body.firstChild);
}

// Añadir botón logout si no existe
if (!logoutBtn && document.querySelector('.header-actions')) {
  const btn = document.createElement('button');
  btn.id = 'logoutBtn';
  btn.textContent = 'Cerrar sesión';
  btn.style.cssText = `
    background: #f44336;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 25px;
    cursor: pointer;
    display: none;
  `;
  document.querySelector('.header-actions').appendChild(btn);
}

// ══════════════════════════════════════════════
// ESTADO GLOBAL
// ══════════════════════════════════════════════
let surveyData = [];
let mainChart = null;
let currentMode = 'accumulated';
let monthlyGoal = 10.00;
let lastMonthEarned = 0;

// ══════════════════════════════════════════════
// LOGIN / LOGOUT
// ══════════════════════════════════════════════
document.addEventListener('click', (e) => {
  if (e.target.id === 'loginBtn') {
    signInWithPopup(auth, provider)
      .catch(error => {
        console.error("Error login:", error);
        alert("Error al iniciar sesión");
      });
  }
  
  if (e.target.id === 'logoutBtn') {
    signOut(auth);
  }
});

// ══════════════════════════════════════════════
// DETECTAR CAMBIOS DE SESIÓN
// ══════════════════════════════════════════════
onAuthStateChanged(auth, (user) => {
  const loginScreen = document.getElementById('loginScreen');
  const logoutBtn = document.getElementById('logoutBtn');
  const container = document.querySelector('.container');
  
  if (user) {
    // 🔐 USUARIO LOGUEADO
    console.log("✅ Usuario:", user.email, "UID:", user.uid);
    
    if (loginScreen) loginScreen.style.display = 'none';
    if (container) container.style.display = 'block';
    if (logoutBtn) logoutBtn.style.display = 'inline-block';
    if (userNameSpan) userNameSpan.textContent = user.displayName || user.email;
    
    // 🔥 CARGAR SOLO SUS DATOS
    loadUserData(user.uid);
    
  } else {
    // ❌ SIN LOGIN
    console.log("❌ No logueado");
    if (loginScreen) loginScreen.style.display = 'flex';
    if (container) container.style.display = 'none';
    if (logoutBtn) logoutBtn.style.display = 'none';
  }
});

// ══════════════════════════════════════════════
// CARGAR DATOS DEL USUARIO
// ══════════════════════════════════════════════
function loadUserData(uid) {
  show('loadingSpinner');
  hide('errorMessage');
  
  const userRef = ref(db, `users/${uid}/surveys`);
  
  onValue(userRef, (snapshot) => {
    const raw = snapshot.val();
    
    hide('loadingSpinner');
    
    if (!raw) {
      surveyData = [];
      processData();
      showError('Aún no tienes datos. Usa el bot de Telegram para añadir encuestas.');
      return;
    }
    
    // Convertir a array y parsear fechas
    surveyData = Object.entries(raw).map(([id, v]) => ({
      ...v,
      id,
      fecha: parseDate(v.fecha)
    })).sort((a, b) => b.fecha - a.fecha);
    
    processData();
    
    // Actualizar timestamp header
    document.getElementById('lastUpdate').textContent =
      'Actualizado: ' + new Date().toLocaleTimeString('es-ES');
      
  }, (error) => {
    hide('loadingSpinner');
    showError('Error al cargar datos: ' + error.message);
  });
}

// ══════════════════════════════════════════════
// RESTO DEL CÓDIGO (sin cambios)
// ══════════════════════════════════════════════

function parseDate(v) {
  if (v instanceof Date) return v;
  if (!v) return new Date();
  const iso = new Date(v);
  if (!isNaN(iso)) return iso;
  const m = String(v).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})\s+(\d{1,2}):(\d{2})/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]);
  return new Date();
}

function processData() {
  const now = new Date();
  const thisMonth = now.getMonth();
  const thisYear = now.getFullYear();

  let totalEarned = 0;
  let totalWithdrawn = 0;
  let successCount = 0;
  let attemptCount = 0;
  let thisMonthEarned = 0;
  let thisMonthSurveys = 0;

  const monthly = {};

  surveyData.forEach(item => {
    const key = monthKey(item.fecha);
    if (!monthly[key]) monthly[key] = { earned:0, withdrawn:0, success:0, attempts:0 };

    switch (item.tipo) {
      case 'encuesta':
        totalEarned += item.importe;
        monthly[key].earned += item.importe;
        monthly[key].success += 1;
        monthly[key].attempts+= 1;
        successCount++;
        attemptCount++;
        if (item.fecha.getMonth()===thisMonth && item.fecha.getFullYear()===thisYear) {
          thisMonthEarned += item.importe;
          thisMonthSurveys += 1;
        }
        break;
      case 'screener':
      case 'descalificado':
        monthly[key].attempts += 1;
        attemptCount++;
        break;
      case 'retiro':
        totalWithdrawn += item.importe;
        monthly[key].withdrawn += item.importe;
        break;
      case 'bonus':
        totalEarned += item.importe;
        monthly[key].earned += item.importe;
        if (item.fecha.getMonth()===thisMonth && item.fecha.getFullYear()===thisYear) {
          thisMonthEarned += item.importe;
        }
        break;
    }
  });

  const currentBalance = totalEarned - totalWithdrawn;
  const avgPerSurvey = successCount > 0 ? (totalEarned / successCount) : 0;
  const successRate = attemptCount > 0 ? (successCount / attemptCount * 100) : 0;

  const prevKey = prevMonthKey(now);
  lastMonthEarned = monthly[prevKey] ? monthly[prevKey].earned : 0;
  monthlyGoal = calcAdaptiveGoal(lastMonthEarned);

  setTxt('total-earned', fmt(totalEarned));
  setTxt('current-balance', fmt(currentBalance));
  setTxt('total-withdrawn', fmt(totalWithdrawn));
  setTxt('success-rate', successRate.toFixed(1));
  setTxt('success-counts', `${successCount} completadas / ${attemptCount} intentos`);
  setTxt('avg-per-survey', fmt(avgPerSurvey));
  setTxt('this-month-earned', fmt(thisMonthEarned));
  setTxt('this-month-surveys',thisMonthSurveys);

  updateGoalWidget(thisMonthEarned);
  updateMonthlySummary(monthly);
  buildChart(surveyData, 'accumulated');
  buildSchedule(surveyData);
  updateRecentActivity(surveyData.slice(0, 6));

  setTxt('month-label', now.toLocaleDateString('es-ES',{month:'long', year:'numeric'}));
  setTxt('recent-count', `${Math.min(surveyData.length,6)} registros`);
}

function updateGoalWidget(thisMonthEarned) {
  const pct = Math.min((thisMonthEarned / monthlyGoal) * 100, 100);
  setTxt('goal-current', fmt(thisMonthEarned));
  setTxt('goal-target', fmt(monthlyGoal));
  setTxt('goal-display', fmt(monthlyGoal));
  setTxt('progress-pct', pct.toFixed(1) + '% completado');
  document.getElementById('monthly-progress').style.width = pct + '%';
  document.getElementById('goal-achievement').style.display =
    thisMonthEarned >= monthlyGoal ? 'flex' : 'none';
  setTxt('adaptive-goal-info',
    lastMonthEarned > 0
    ? `${fmt(lastMonthEarned)} € ganados el mes anterior`
    : 'meta base de €10.00');
}

function updateMonthlySummary(monthly) {
  const tbody = document.querySelector('#monthly-summary tbody');
  tbody.innerHTML = '';
  Object.entries(monthly)
    .sort(([a],[b]) => b.localeCompare(a))
    .forEach(([key, d]) => {
      const rate = d.attempts > 0 ? (d.success/d.attempts*100).toFixed(1) : '—';
      const avg = d.success > 0 ? fmt(d.earned/d.success) : '—';
      tbody.innerHTML += `
        <tr>
          <td>${formatMonthLabel(key)}</td>
          <td class="positive">€${fmt(d.earned)}</td>
          <td class="${d.withdrawn>0?'negative':''}">€${fmt(d.withdrawn)}</td>
          <td>${d.success}</td>
          <td>${d.attempts}</td>
          <td>${rate}%</td>
          <td>€${avg}</td>
        </tr>`;
    });
}

function buildChart(data, mode) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) mainChart.destroy();

  let labels, values, label, color;
  const sorted = [...data].sort((a,b) => a.fecha - b.fecha);

  if (mode === 'accumulated') {
    let acc = 0;
    const points = sorted
      .filter(d => d.tipo === 'encuesta' || d.tipo === 'bonus')
      .map(d => { acc += d.importe; return { x: d.fecha, y: acc }; });
    labels = points.map(p => fmtDateShort(p.x));
    values = points.map(p => p.y);
    label = 'Ganancias acumuladas (€)';
    color = '#6366f1';
  }
  else if (mode === 'monthly') {
    const monthly = {};
    sorted.filter(d => d.tipo==='encuesta'||d.tipo==='bonus')
      .forEach(d => {
        const k = monthKey(d.fecha);
        monthly[k] = (monthly[k]||0) + d.importe;
      });
    labels = Object.keys(monthly).sort().map(formatMonthLabel);
    values = Object.keys(monthly).sort().map(k => monthly[k]);
    label = 'Ganancias por mes (€)';
    color = '#10b981';
  }
  else {
    const daily = {};
    sorted.filter(d => d.tipo==='encuesta'||d.tipo==='bonus')
      .forEach(d => {
        const k = d.fecha.toISOString().slice(0,10);
        daily[k] = (daily[k]||0) + d.importe;
      });
    labels = Object.keys(daily).sort().map(k => {
      const [y,m,d] = k.split('-');
      return `${d}/${m}`;
    });
    values = Object.keys(daily).sort().map(k => daily[k]);
    label = 'Ganancias diarias (€)';
    color = '#ec4899';
  }

  mainChart = new Chart(ctx, {
    type: mode === 'accumulated' ? 'line' : 'bar',
    data: {
      labels,
      datasets: [{
        label,
        data: values,
        borderColor: color,
        backgroundColor: mode === 'accumulated'
          ? hexAlpha(color, 0.12)
          : hexAlpha(color, 0.7),
        borderWidth: 2.5,
        fill: mode === 'accumulated',
        tension: 0.4,
        pointRadius: mode === 'accumulated' ? 0 : undefined,
        pointHoverRadius: 5,
        borderRadius: mode !== 'accumulated' ? 6 : undefined
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,0.85)',
          padding: 12,
          callbacks: {
            label: c => ` €${c.parsed.y.toFixed(2)}`
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(148,163,184,0.08)' },
          ticks: { callback: v => '€'+v.toFixed(2) }
        },
        x: {
          grid: { display: false },
          ticks: { maxTicksLimit: 14, maxRotation: 45 }
        }
      }
    }
  });
}

window.switchChart = function(mode, btn) {
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMode = mode;
  buildChart(surveyData, mode);
}

function buildSchedule(data) {
  const encuestas = data.filter(d => d.tipo === 'encuesta');
  const grid = document.getElementById('schedule-grid');
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  grid.innerHTML = '<div class="schedule-header">Hora</div>';
  dias.forEach(d => grid.innerHTML += `<div class="schedule-header">${d}</div>`);
  for (let h = 0; h < 24; h++) {
    const label = h === 0 ? '12am' : h < 12 ? `${h}am` : h === 12 ? '12pm' : `${h-12}pm`;
    grid.innerHTML += `<div class="schedule-header">${label}</div>`;
    dias.forEach((_, di) => {
      const cnt = encuestas.filter(e => e.fecha.getDay()===di && e.fecha.getHours()===h).length;
      const cls = cnt===0?'no-data':cnt>=3?'high-activity':cnt>=2?'medium-activity':'low-activity';
      grid.innerHTML += `<div class="schedule-cell ${cls}">${cnt||''}</div>`;
    });
  }
}

function updateRecentActivity(items) {
  const container = document.getElementById('recent-activity');
  if (!items.length) { 
    container.innerHTML = '<p style="color:var(--text-3);font-size:.9rem">Sin actividad registrada.</p>'; 
    return; 
  }
  container.innerHTML = items.map(item => {
    let iconCls, iconI, amountCls, amountTxt;
    switch(item.tipo) {
      case 'encuesta':
        iconCls='earned'; iconI='fa-check';
        amountCls='positive'; amountTxt=`+€${fmt(item.importe)}`;
        break;
      case 'retiro':
        iconCls='withdrawn'; iconI='fa-paper-plane';
        amountCls='negative'; amountTxt=`-€${fmt(item.importe)}`;
        break;
      case 'screener':
      case 'descalificado':
        iconCls='failed'; iconI='fa-times';
        amountCls='neutral'; amountTxt='€0.00';
        break;
      case 'bonus':
        iconCls='bonus'; iconI='fa-star';
        amountCls='positive'; amountTxt=`+€${fmt(item.importe)}`;
        break;
      default:
        iconCls='earned'; iconI='fa-circle';
        amountCls='neutral'; amountTxt=`€${fmt(item.importe||0)}`;
    }
    return `
      <div class="activity-item">
        <div class="activity-icon ${iconCls}"><i class="fas ${iconI}"></i></div>
        <div class="activity-content">
          <div class="activity-title">${item.concepto || item.tipo}</div>
          <div class="activity-details">${fmtDateFull(item.fecha)}</div>
        </div>
        <span class="activity-amount ${amountCls}">${amountTxt}</span>
      </div>`;
  }).join('');
}

function calcAdaptiveGoal(lastEarned) {
  if (lastEarned <= 0) return 10.00;
  if (lastEarned > 30) return +(lastEarned * 1.10).toFixed(2);
  if (lastEarned > 20) return +(lastEarned * 1.08).toFixed(2);
  if (lastEarned > 10) return +(lastEarned * 1.05).toFixed(2);
  return +(lastEarned * 1.03).toFixed(2);
}

const fmt = v => parseFloat(v||0).toFixed(2);
const setTxt = (id, v) => { const el=document.getElementById(id); if(el) el.textContent=v; };
const show = id => { const el=document.getElementById(id); if(el) el.style.display='block'; };
const hide = id => { const el=document.getElementById(id); if(el) el.style.display='none'; };

function showError(msg) {
  const el = document.getElementById('errorMessage');
  el.textContent = msg;
  el.style.display = 'block';
}

function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function prevMonthKey(d){ const p=new Date(d.getFullYear(),d.getMonth()-1,1); return monthKey(p); }
function formatMonthLabel(key) {
  const [y,m] = key.split('-');
  return new Date(+y,+m-1,1).toLocaleDateString('es-ES',{month:'short',year:'numeric'});
}
function fmtDateShort(d) { return `${d.getDate()}/${d.getMonth()+1}`; }
function fmtDateFull(d) {
  return d.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) +
    ' ' + d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
function hexAlpha(hex, a) {
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

window.toggleTheme = function() {
  const body = document.body;
  const next = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  body.setAttribute('data-theme', next);
  document.getElementById('theme-icon').className = next==='light' ? 'fas fa-moon' : 'fas fa-sun';
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key==='t') { e.preventDefault(); toggleTheme(); }
});
</script>
