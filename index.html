<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONELIFE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    :root {
      --primary: #00f7ff;
      --secondary: #7700ff;
      --accent: #ff00c8;
      --success: #00ff9d;
      --dark: #0a0a18;
      --light: #f0f0f0;
      --gray: #a0a0c0;
      --transition: all 0.3s ease;
      --radius: 12px;
      --shadow: 0 0 20px rgba(0, 247, 255, 0.3);
      --day-primary: #5d8aa8;
      --day-secondary: #8a83c2;
      --day-accent: #b19cd9;
      --day-bg: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      --day-text: #495057;
      --day-card: rgba(255, 255, 255, 0.95);
      --day-border: rgba(93, 138, 168, 0.2);
      --day-glow: 0 0 10px rgba(93, 138, 168, 0.2);
      --day-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #0a0a18 0%, #12122e 100%);
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      transition: var(--transition);
    }

    body.light-mode {
      background: var(--day-bg);
      color: var(--day-text);
    }

    .bg-grid {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        linear-gradient(rgba(0,247,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,247,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
    }

    .light-mode .bg-grid {
      background:
        linear-gradient(rgba(93,138,168,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(93,138,168,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .floating-shapes {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.3;
      filter: blur(60px);
    }

    .shape-1 {
      width: 300px; height: 300px;
      background: var(--primary);
      top: -100px; left: -100px;
      animation: float 15s infinite ease-in-out;
    }

    .shape-2 {
      width: 500px; height: 500px;
      background: var(--secondary);
      bottom: -200px; right: -200px;
      animation: float 18s infinite ease-in-out reverse;
    }

    .shape-3 {
      width: 200px; height: 200px;
      background: var(--accent);
      top: 50%; left: 70%;
      animation: float 12s infinite ease-in-out 2s;
    }

    .light-mode .shape-1 { background: var(--day-primary);   opacity: 0.10; }
    .light-mode .shape-2 { background: var(--day-secondary); opacity: 0.08; }
    .light-mode .shape-3 { background: var(--day-accent);    opacity: 0.06; }

    @keyframes float {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      25%      { transform: translate(-30px,40px) rotate(5deg); }
      50%      { transform: translate(20px,-30px) rotate(-5deg); }
      75%      { transform: translate(30px,30px) rotate(5deg); }
    }

    .scan-lines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(transparent 50%, rgba(0,0,0,0.1) 50%);
      background-size: 100% 4px;
      z-index: 0;
      pointer-events: none;
      opacity: 0.2;
    }

    .light-mode .scan-lines { opacity: 0.05; }

    /* ══════════════════════════════════
       HEADER
    ══════════════════════════════════ */
    header {
      background: rgba(10,10,24,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,247,255,0.2);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 1rem 0;
      overflow: hidden;
      transition: var(--transition);
    }

    .light-mode header {
      background: rgba(248,249,250,0.92);
      border-bottom: 1px solid var(--day-border);
    }

    .neon-cascade {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .cascade-particle {
      position: absolute;
      width: 2px; height: 15px;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
      opacity: 0;
      border-radius: 2px;
    }

    .header-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--primary);
      text-decoration: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
      text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary);
      animation: flicker 5s infinite alternate;
      transition: var(--transition);
    }

    .light-mode .logo {
      color: var(--day-primary);
      text-shadow: 0 0 5px rgba(93,138,168,0.3);
      animation: none;
    }

    .logo:hover {
      color: #fff;
      animation: none;
      text-shadow: 0 0 15px var(--primary), 0 0 25px var(--primary), 0 0 40px var(--primary);
    }

    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% {
        opacity: 1;
        text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary);
      }
      20%,24%,55% {
        opacity: 0.8;
        text-shadow: 0 0 7px var(--primary), 0 0 15px var(--primary),
                     0 0 25px var(--secondary);
      }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav ul li a {
      text-decoration: none;
      color: var(--gray);
      font-weight: 600;
      transition: var(--transition);
      position: relative;
      padding: 0.5rem 0;
    }

    .light-mode nav ul li a { color: #6c757d; }
    nav ul li a:hover { color: var(--primary); }
    .light-mode nav ul li a:hover { color: var(--day-primary); }

    nav ul li a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 2px;
      background: var(--primary);
      transition: var(--transition);
    }

    nav ul li a:hover::after { width: 100%; }

    .theme-toggle {
      background: transparent;
      border: none;
      color: var(--gray);
      cursor: pointer;
      font-size: 1.2rem;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .theme-toggle:hover {
      color: var(--primary);
      transform: rotate(30deg);
    }

    .light-mode .theme-toggle:hover { color: var(--day-primary); }

    .menu-toggle {
      display: none;
      color: var(--primary);
      font-size: 1.5rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .light-mode .menu-toggle { color: var(--day-primary); }

    /* ── Auth header ── */
    .auth-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #loginBtn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1.1rem;
      border-radius: 50px;
      background: rgba(0,247,255,0.1);
      color: var(--primary);
      border: 1px solid rgba(0,247,255,0.35);
      font-size: 0.87rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    #loginBtn:hover {
      background: rgba(0,247,255,0.22);
      transform: translateY(-2px);
      box-shadow: 0 0 18px rgba(0,247,255,0.35);
    }

    .light-mode #loginBtn {
      background: rgba(93,138,168,0.1);
      color: var(--day-primary);
      border-color: var(--day-border);
    }

    .light-mode #loginBtn:hover { background: rgba(93,138,168,0.2); }

    #userAvatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      object-fit: cover;
      cursor: pointer;
      transition: var(--transition);
      display: none;
      box-shadow: 0 0 10px rgba(0,247,255,0.4);
    }

    .light-mode #userAvatar { border-color: var(--day-primary); }

    #userAvatar:hover {
      transform: scale(1.1);
      box-shadow: 0 0 18px rgba(0,247,255,0.6);
    }

    /* ══════════════════════════════════
       OVERLAY
    ══════════════════════════════════ */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(3px);
    }

    #overlay.open { opacity: 1; pointer-events: all; }

    /* ══════════════════════════════════
       SIDEBAR
    ══════════════════════════════════ */
    #sidebar {
      position: fixed;
      top: 0; right: -360px;
      width: 320px;
      max-width: 90vw;
      height: 100%;
      background: rgba(10,10,30,0.97);
      border-left: 1px solid rgba(0,247,255,0.25);
      backdrop-filter: blur(18px);
      z-index: 1999;
      transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .light-mode #sidebar {
      background: rgba(248,249,250,0.98);
      border-left-color: var(--day-border);
    }

    #sidebar.open { right: 0; }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.4rem;
      border-bottom: 1px solid rgba(0,247,255,0.15);
      flex-shrink: 0;
    }

    .light-mode .sidebar-header { border-bottom-color: var(--day-border); }

    .sidebar-header h3 {
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      color: var(--primary);
      letter-spacing: 1px;
    }

    .light-mode .sidebar-header h3 { color: var(--day-primary); }

    .sidebar-close {
      background: none;
      border: none;
      color: var(--gray);
      font-size: 1.1rem;
      cursor: pointer;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .sidebar-close:hover {
      color: var(--primary);
      background: rgba(0,247,255,0.1);
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .sidebar-body::-webkit-scrollbar { width: 4px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb {
      background: rgba(0,247,255,0.2);
      border-radius: 2px;
    }

    /* ── Bloque de perfil ── */
    .profile-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      padding: 1.5rem 1.5rem 1.2rem;
      background: rgba(0,247,255,0.04);
      border: 1px solid rgba(0,247,255,0.12);
      border-radius: var(--radius);
    }

    .light-mode .profile-block {
      background: rgba(93,138,168,0.05);
      border-color: var(--day-border);
    }

    /* Contenedor del avatar con botón lápiz */
    .avatar-wrapper {
      position: relative;
      width: 82px; height: 82px;
      flex-shrink: 0;
    }

    #sidebarAvatar {
      width: 82px; height: 82px;
      border-radius: 50%;
      border: 3px solid var(--primary);
      object-fit: cover;
      box-shadow: 0 0 20px rgba(0,247,255,0.4);
      background: rgba(0,247,255,0.05);
      display: block;
    }

    .light-mode #sidebarAvatar { border-color: var(--day-primary); }

    /* Botón lápiz sobre el avatar */
    #editAvatarBtn {
      position: absolute;
      bottom: 0; right: 0;
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid rgba(10,10,30,0.9);
      color: #000;
      font-size: 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      box-shadow: 0 0 8px rgba(0,247,255,0.5);
    }

    .light-mode #editAvatarBtn {
      background: var(--day-primary);
      border-color: rgba(248,249,250,0.9);
      color: #fff;
    }

    #editAvatarBtn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 14px rgba(0,247,255,0.7);
    }

    .profile-name {
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
    }

    .profile-email {
      font-size: 0.78rem;
      color: var(--gray);
      text-align: center;
      word-break: break-all;
    }

    /* ── Barra flotante para introducir URL ── */
    #avatarBar {
      display: none;                 /* oculta por defecto */
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      background: rgba(10,10,30,0.97);
      border: 1px solid rgba(0,247,255,0.35);
      border-radius: 50px;
      box-shadow: 0 0 24px rgba(0,247,255,0.25);
      animation: slideUp 0.25s ease-out;
    }

    .light-mode #avatarBar {
      background: rgba(248,249,250,0.98);
      border-color: var(--day-border);
      box-shadow: var(--day-shadow);
    }

    #avatarBar.visible { display: flex; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #avatarBar i {
      color: var(--primary);
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .light-mode #avatarBar i { color: var(--day-primary); }

    #avatarUrlInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 0.83rem;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-width: 0;
    }

    .light-mode #avatarUrlInput { color: var(--day-text); }
    #avatarUrlInput::placeholder { color: #555; }
    .light-mode #avatarUrlInput::placeholder { color: #aaa; }

    /* Botones dentro de la barra */
    .bar-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
      transition: var(--transition);
    }

    #applyAvatarBtn {
      background: var(--primary);
      color: #000;
    }

    #applyAvatarBtn:hover {
      background: #00d4dc;
      transform: scale(1.1);
    }

    #cancelAvatarBtn {
      background: rgba(255,60,60,0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255,60,60,0.3);
    }

    #cancelAvatarBtn:hover {
      background: rgba(255,60,60,0.3);
      transform: scale(1.1);
    }

    /* Info card */
    .info-card {
      background: rgba(0,247,255,0.04);
      border: 1px solid rgba(0,247,255,0.1);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
    }

    .light-mode .info-card {
      background: rgba(93,138,168,0.05);
      border-color: var(--day-border);
    }

    .info-card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray);
      margin-bottom: 0.65rem;
      font-weight: 600;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      padding: 0.3rem 0;
      color: var(--light);
    }

    .light-mode .info-row { color: var(--day-text); }

    .info-row i {
      color: var(--primary);
      width: 16px;
      text-align: center;
      font-size: 0.9rem;
    }

    .light-mode .info-row i { color: var(--day-primary); }

    /* Footer sidebar */
    .sidebar-footer {
      padding: 1rem 1.4rem 1.4rem;
      border-top: 1px solid rgba(0,247,255,0.12);
      flex-shrink: 0;
    }

    .light-mode .sidebar-footer { border-top-color: var(--day-border); }

    #logoutBtn {
      width: 100%;
      padding: 0.75rem;
      border-radius: var(--radius);
      background: rgba(255,60,60,0.1);
      color: #ff6b6b;
      border: 1px solid rgba(255,60,60,0.3);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    #logoutBtn:hover {
      background: rgba(255,60,60,0.22);
      box-shadow: 0 0 15px rgba(255,60,60,0.3);
      transform: translateY(-1px);
    }

    /* ══════════════════════════════════
       HERO
    ══════════════════════════════════ */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 6rem 2rem;
      max-width: 1200px;
      margin: auto;
      gap: 4rem;
    }

    .hero-content h1 {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .light-mode .hero-content h1 {
      background: linear-gradient(90deg, var(--day-primary), var(--day-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-cta {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .btn {
      padding: 1rem 1.5rem;
      border-radius: var(--radius);
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: var(--transition);
      cursor: pointer;
      text-align: center;
      position: relative;
      overflow: hidden;
      z-index: 1;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    .btn-primary {
      background: rgba(0,247,255,0.1);
      color: var(--primary);
      border: 1px solid rgba(0,247,255,0.3);
      box-shadow: var(--shadow);
    }

    .light-mode .btn-primary {
      background: rgba(93,138,168,0.08);
      color: var(--day-primary);
      border: 1px solid var(--day-border);
      box-shadow: var(--day-shadow);
    }

    .btn-primary:hover {
      background: rgba(0,247,255,0.2);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,247,255,0.4);
    }

    .light-mode .btn-primary:hover {
      background: rgba(93,138,168,0.15);
      box-shadow: 0 8px 20px rgba(93,138,168,0.2);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,247,255,0.2), transparent);
      transition: 0.5s;
      z-index: -1;
    }

    .btn-primary:hover::before { left: 100%; }

    .hero-animation {
      position: relative;
      width: 100%; height: 400px;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,247,255,0.3);
      background: rgba(0,0,0,0.3);
    }

    .light-mode .hero-animation {
      background: rgba(255,255,255,0.15);
      border-color: var(--day-border);
      box-shadow: var(--day-shadow);
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ══════════════════════════════════
       TOAST
    ══════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,247,255,0.12);
      border: 1px solid rgba(0,247,255,0.35);
      color: var(--primary);
      padding: 0.7rem 1.6rem;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 600;
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s ease;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #toast.error {
      background: rgba(255,60,60,0.12);
      border-color: rgba(255,60,60,0.35);
      color: #ff6b6b;
    }

    /* ══════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════ */
    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 3rem;
        padding: 4rem 2rem;
      }

      .hero-cta { grid-template-columns: 1fr; }

      nav ul {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%; left: 0;
        width: 100%;
        background: rgba(10,10,24,0.97);
        backdrop-filter: blur(10px);
        padding: 1rem 0;
        border-top: 1px solid rgba(0,247,255,0.2);
        z-index: 999;
      }

      .light-mode nav ul {
        background: rgba(248,249,250,0.97);

    }
  </style>

<body>

  <!-- ══════════════════════════════════
       FIREBASE
  ══════════════════════════════════ -->
  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider,
      signInWithPopup, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyDCm1pFZLRXk34UIGU3UY0ltLkyHkElsIg",
      authDomain:        "onelife-cec55.firebaseapp.com",
      projectId:         "onelife-cec55",
      storageBucket:     "onelife-cec55.firebasestorage.app",
      messagingSenderId: "599128086819",
      appId:             "1:599128086819:web:af149214fe5b68a12ad496",
      databaseURL:       "https://onelife-cec55-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const db       = getDatabase(app);
    const provider = new GoogleAuthProvider();

    /* ── Elementos ── */
    const loginBtn         = document.getElementById('loginBtn');
    const logoutBtn        = document.getElementById('logoutBtn');
    const userAvatar       = document.getElementById('userAvatar');
    const sidebar          = document.getElementById('sidebar');
    const overlay          = document.getElementById('overlay');
    const sidebarClose     = document.getElementById('sidebarClose');
    const sidebarAvatar    = document.getElementById('sidebarAvatar');
    const sidebarName      = document.getElementById('sidebarName');
    const sidebarEmail     = document.getElementById('sidebarEmail');
    const editAvatarBtn    = document.getElementById('editAvatarBtn');
    const avatarBar        = document.getElementById('avatarBar');
    const avatarUrlInput   = document.getElementById('avatarUrlInput');
    const applyAvatarBtn   = document.getElementById('applyAvatarBtn');
    const cancelAvatarBtn  = document.getElementById('cancelAvatarBtn');
    const toast            = document.getElementById('toast');

    /* ── Toast ── */
    function showToast(msg, isError = false) {
      toast.textContent = msg;
      toast.className   = 'show' + (isError ? ' error' : '');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { toast.className = ''; }, 3000);
    }

    /* ── Sidebar ── */
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('open');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
      hideAvatarBar();
    }

    userAvatar.addEventListener('click', openSidebar);
    sidebarClose.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);

    /* ── Barra de URL ── */
    function showAvatarBar() {
      avatarBar.classList.add('visible');
      avatarUrlInput.value = '';
      avatarUrlInput.focus();
    }

    function hideAvatarBar() {
      avatarBar.classList.remove('visible');
      avatarUrlInput.value = '';
    }

    editAvatarBtn.addEventListener('click', () => {
      avatarBar.classList.contains('visible')
        ? hideAvatarBar()
        : showAvatarBar();
    });

    cancelAvatarBtn.addEventListener('click', hideAvatarBar);

    /* Enter confirma */
    avatarUrlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') applyAvatarBtn.click();
      if (e.key === 'Escape') hideAvatarBar();
    });

    /* ── Aplicar avatar ── */
    applyAvatarBtn.addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) { showToast('Inicia sesión primero.', true); return; }

      const url = avatarUrlInput.value.trim();
      if (!url)  { showToast('Pega una URL de imagen válida.', true); return; }

      /* Verificar que la URL carga una imagen real */
      const testImg   = new Image();
      testImg.onload  = async () => {
        try {
          await set(ref(db, 'users/' + user.uid + '/avatarUrl'), url);
          applyAvatarToUI(url);
          hideAvatarBar();
          showToast('✓ Foto de perfil actualizada');
        } catch (err) {
          showToast('Error al guardar: ' + err.message, true);
        }
      };
      testImg.onerror = () => {
        showToast('La URL no es una imagen válida.', true);
      };
      testImg.src = url;
    });

    /* ── Helpers ── */
    function applyAvatarToUI(url) {
      if (!url) return;
      userAvatar.src    = url;
      sidebarAvatar.src = url;
    }

    async function loadProfile(user) {
      try {
        const snap = await get(ref(db, 'users/' + user.uid));
        let avatarUrl = user.photoURL || '';
        if (snap.exists() && snap.val().avatarUrl) {
          avatarUrl = snap.val().avatarUrl;
        }
        applyAvatarToUI(avatarUrl);
      } catch (err) {
        applyAvatarToUI(user.photoURL || '');
        console.warn('No se pudo cargar el perfil:', err.message);
      }
      sidebarName.textContent  = user.displayName || 'Usuario';
      sidebarEmail.textContent = user.email || '';
    }

    /* ── Login / Logout ── */
    loginBtn.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        showToast('Error al iniciar sesión.', true);
        console.error(err);
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
      closeSidebar();
      showToast('Sesión cerrada correctamente');
    });

    /* ── Estado de sesión ── */
    onAuthStateChanged(auth, async user => {
      if (user) {
        loginBtn.style.display   = 'none';
        userAvatar.style.display = 'inline-block';
        await loadProfile(user);
      } else {
        loginBtn.style.display   = 'inline-flex';
        userAvatar.style.display = 'none';
        sidebarName.textContent  = '—';
        sidebarEmail.textContent = '—';
        sidebarAvatar.src        = '';
        userAvatar.src           = '';
      }
    });
  </script>

  <!-- ══════════════════════════════════
       JS — Partículas, menú, tema
  ══════════════════════════════════ -->
  <script>
    /* Menú móvil */
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('navMenu').classList.toggle('active');
    });

    /* Canvas partículas */
    const canvas = document.getElementById('particles');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resizeCanvas();

    const NUM_PARTICLES   = 80;
    const CONNECTION_DIST = 120;
    let   particlesArray  = [];

    const darkColors  = [
      { r:0,   g:247, b:255 },
      { r:119, g:0,   b:255 },
      { r:255, g:0,   b:200 }
    ];
    const lightColors = [
      { r:93,  g:138, b:168 },
      { r:138, g:131, b:194 },
      { r:177, g:156, b:217 }
    ];

    class Particle {
      constructor() {
        this.x      = Math.random() * canvas.width;
        this.y      = Math.random() * canvas.height;
        this.size   = 1 + Math.random() * 3;
        this.speedX = (Math.random() - 0.5) * 1;
        this.speedY = (Math.random() - 0.5) * 1;
        this.glow   = 5 + Math.random() * 10;
        const pal   = document.body.classList.contains('light-mode')
                      ? lightColors : darkColors;
        this.color  = pal[Math.floor(Math.random() * pal.length)];
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width)  this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height)  this.speedY *= -1;
      }

      draw() {
        const isDay     = document.body.classList.contains('light-mode');
        const glowAlpha = isDay ? 0.4 : 0.8;
        const { r, g, b } = this.color;

        const grad = ctx.createRadialGradient(
          this.x, this.y, this.size,
          this.x, this.y, this.size + this.glow
        );
        grad.addColorStop(0, `rgba(${r},${g},${b},${glowAlpha})`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0)`);

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size + this.glow, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fill();
      }
    }

    function init() {
      particlesArray = [];
      for (let i = 0; i < NUM_PARTICLES; i++) {
        particlesArray.push(new Particle());
      }
    }

    function connect() {
      const isDay  = document.body.classList.contains('light-mode');
      const lineOp = isDay ? 0.2 : 0.3;

      for (let a = 0; a < particlesArray.length; a++) {
        for (let b = a + 1; b < particlesArray.length; b++) {
          const dx   = particlesArray[a].x - particlesArray[b].x;
          const dy   = particlesArray[a].y - particlesArray[b].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < CONNECTION_DIST) {
            const op = (1 - dist / CONNECTION_DIST) * lineOp;
            const { r:r1,g:g1,b:b1 } = particlesArray[a].color;
            const { r:r2,g:g2,b:b2 } = particlesArray[b].color;

            const grad = ctx.createLinearGradient(
              particlesArray[a].x, particlesArray[a].y,
              particlesArray[b].x, particlesArray[b].y
            );
            grad.addColorStop(0, `rgba(${r1},${g1},${b1},${op})`);
            grad.addColorStop(1, `rgba(${r2},${g2},${b2},${op})`);

            ctx.strokeStyle = grad;
            ctx.lineWidth   = 1;
            ctx.beginPath();
            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
            ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesArray.forEach(p => { p.update(); p.draw(); });
      connect();
      requestAnimationFrame(animate);
    }

    init();
    animate();

    window.addEventListener('resize', () => { resizeCanvas(); init(); });

    /* Cascada neon */
    const neonCascade = document.getElementById('neonCascade');

    function createCascadeParticle() {
      const p    = document.createElement('div');
      p.classList.add('cascade-particle');
      p.style.left   = Math.random() * 100 + '%';
      p.style.width  = (1 + Math.random() * 2) + 'px';
      p.style.height = (10 + Math.random() * 20) + 'px';
      neonCascade.appendChild(p);

      const dur = 3 + Math.random() * 4;
      const del = Math.random() * 2;

      p.animate([
        { transform: 'translateY(-20px)',                    opacity: 0   },
        { transform: 'translateY(0)',                        opacity: 0.7 },
        { transform: `translateY(${window.innerHeight}px)`,  opacity: 0   }
      ], {
        duration: dur * 1000,
        delay:    del * 1000,
        easing:   'cubic-bezier(0.4,0,0.2,1)'
      });

      setTimeout(() => p.remove(), (dur + del) * 1000);
    }

    (function cascade() {
      createCascadeParticle();
      setTimeout(cascade, 100 + Math.random() * 200);
    })();

    /* Tema */
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon   = themeToggle.querySelector('i');

    function updateThemeIcon() {
      themeIcon.className = document.body.classList.contains('light-mode')
        ? 'fas fa-sun' : 'fas fa-moon';
    }

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      document.body.classList.toggle('light-mode', savedTheme === 'light');
      updateThemeIcon();
      init();
    }

    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme',
        document.body.classList.contains('light-mode') ? 'light' : 'dark');
      updateThemeIcon();
      init();
    });
  </script>
