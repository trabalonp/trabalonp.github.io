<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivos Académicos - ONELIFE</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
:root {
--primary: #00f7ff;
--secondary: #7700ff;
--accent: #ff00c8;
--success: #00ff9d;
--dark: #0a0a18;
--light: #f0f0f0;
--gray: #a0a0c0;
--transition: all 0.3s ease;
--radius: 12px;
--shadow: 0 0 20px rgba(0,247,255,0.3);
--day-primary: #5d8aa8;
--day-secondary: #8a83c2;
--day-accent: #b19cd9;
--day-bg: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
--day-text: #495057;
--day-card: rgba(255,255,255,0.95);
--day-border: rgba(93,138,168,0.2);
--day-glow: 0 0 10px rgba(93,138,168,0.2);
--day-shadow: 0 0 15px rgba(0,0,0,0.05);
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

html {
    background-color: #0a0a18;
    overflow: hidden;
    height: 100%;
    overscroll-behavior: none;
}

body {
    margin: 0;
    padding: 0;
    background: var(--dark);
    color: var(--light);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;

    overscroll-behavior-y: none;

    transition: var(--transition);
    position: relative;
}

body.light-mode {
background: var(--day-bg);
color: var(--day-text);
}

.bg-grid {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background:
linear-gradient(rgba(0,247,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,247,255,0.05) 1px, transparent 1px);
background-size: 40px 40px;
z-index: -1;
}

.light-mode .bg-grid {
background:
linear-gradient(rgba(93,138,168,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(93,138,168,0.03) 1px, transparent 1px);
background-size: 40px 40px;
}

.floating-shapes {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: -1;
overflow: hidden;
}

.shape {
position: absolute;
border-radius: 50%;
opacity: 0.3;
filter: blur(60px);
}

.shape-1 {
width: 300px;
height: 300px;
background: var(--primary);
top: -100px;
left: -100px;
animation: float 15s infinite ease-in-out;
}

.shape-2 {
width: 500px;
height: 500px;
background: var(--secondary);
bottom: -200px;
right: -200px;
animation: float 18s infinite ease-in-out reverse;
}

.shape-3 {
width: 200px;
height: 200px;
background: var(--accent);
top: 50%;
left: 70%;
animation: float 12s infinite ease-in-out 2s;
}

.light-mode .shape-1 {
background: var(--day-primary);
opacity: 0.1;
}

.light-mode .shape-2 {
background: var(--day-secondary);
opacity: 0.08;
}

.light-mode .shape-3 {
background: var(--day-accent);
opacity: 0.06;
}

@keyframes float {
0%, 100% { transform: translate(0, 0) rotate(0deg); }
25% { transform: translate(-30px, 40px) rotate(5deg); }
50% { transform: translate(20px, -30px) rotate(-5deg); }
75% { transform: translate(30px, 30px) rotate(5deg); }
}

.scan-lines {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: linear-gradient(transparent 50%, rgba(0,0,0,0.1) 50%);
background-size: 100% 4px;
z-index: 0;
pointer-events: none;
opacity: 0.2;
}

.light-mode .scan-lines {
opacity: 0.05;
}

/* HEADER */
header {
background: rgba(10,10,24,0.85);
backdrop-filter: blur(12px);
border-bottom: 1px solid rgba(0,247,255,0.2);
position: sticky;
top: 0;
z-index: 1000;
padding: 1rem 0;
overflow: hidden;
transition: var(--transition);
}

.light-mode header {
background: rgba(248,249,250,0.92);
border-bottom: 1px solid var(--day-border);
}

.neon-cascade {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
z-index: -1;
}

.cascade-particle {
position: absolute;
width: 2px;
height: 15px;
background: var(--primary);
box-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
opacity: 0;
border-radius: 2px;
}

.header-container {
max-width: 1200px;
margin: 0 auto;
padding: 0 2rem;
display: flex;
justify-content: space-between;
align-items: center;
position: relative;
}

.logo {
font-size: 1.8rem;
font-weight: bold;
color: var(--primary);
text-decoration: none;
font-family: 'Courier New', monospace;
letter-spacing: 1px;
text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary);
animation: flicker 5s infinite alternate;
transition: var(--transition);
}

.light-mode .logo {
color: var(--day-primary);
text-shadow: 0 0 5px rgba(93,138,168,0.3);
animation: none;
}

.logo:hover {
color: #fff;
animation: none;
text-shadow: 0 0 15px var(--primary), 0 0 25px var(--primary), 0 0 40px var(--primary);
}

@keyframes flicker {
0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
opacity: 1;
text-shadow: 0 0 5px var(--primary), 0 0 10px var(--primary);
}
20%, 24%, 55% {
opacity: 0.8;
text-shadow: 0 0 7px var(--primary), 0 0 15px var(--primary), 0 0 25px var(--secondary);
}
}

.header-right {
display: flex;
align-items: center;
gap: 1.5rem;
}

nav ul {
list-style: none;
display: flex;
gap: 2rem;
align-items: center;
}

nav ul li a {
text-decoration: none;
color: var(--gray);
font-weight: 600;
transition: var(--transition);
position: relative;
padding: 0.5rem 0;
}

.light-mode nav ul li a {
color: #6c757d;
}

nav ul li a:hover {
color: var(--primary);
}

.light-mode nav ul li a:hover {
color: var(--day-primary);
}

nav ul li a::after {
content: '';
position: absolute;
bottom: 0;
left: 0;
width: 0;
height: 2px;
background: var(--primary);
transition: var(--transition);
}

nav ul li a:hover::after {
width: 100%;
}

.theme-toggle {
background: transparent;
border: none;
color: var(--gray);
cursor: pointer;
font-size: 1.2rem;
width: 40px;
height: 40px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
transition: var(--transition);
}

.theme-toggle:hover {
color: var(--primary);
transform: rotate(30deg);
}

.light-mode .theme-toggle:hover {
color: var(--day-primary);
}

.menu-toggle {
display: none;
color: var(--primary);
font-size: 1.5rem;
cursor: pointer;
transition: var(--transition);
}

.light-mode .menu-toggle {
color: var(--day-primary);
}

/* Auth */
.auth-area {
display: flex;
align-items: center;
gap: 0.75rem;
visibility: hidden;
opacity: 0;
transition: opacity 0.15s ease;
}

.auth-area.ready {
visibility: visible;
opacity: 1;
}

#loginBtn {
display: inline-flex;
align-items: center;
gap: 0.5rem;
padding: 0.45rem 1.1rem;
border-radius: 50px;
background: rgba(0,247,255,0.1);
color: var(--primary);
border: 1px solid rgba(0,247,255,0.35);
font-size: 0.87rem;
font-weight: 600;
cursor: pointer;
transition: var(--transition);
white-space: nowrap;
font-family: 'Segoe UI', Tahoma, sans-serif;
}

#loginBtn:hover {
background: rgba(0,247,255,0.22);
transform: translateY(-2px);
box-shadow: 0 0 18px rgba(0,247,255,0.35);
}

.light-mode #loginBtn {
background: rgba(93,138,168,0.1);
color: var(--day-primary);
border-color: var(--day-border);
}

.light-mode #loginBtn:hover {
background: rgba(93,138,168,0.2);
}

#userAvatar {
width: 36px;
height: 36px;
border-radius: 50%;
border: 2px solid var(--primary);
object-fit: cover;
cursor: pointer;
transition: var(--transition);
display: none;
box-shadow: 0 0 10px rgba(0,247,255,0.4);
}

.light-mode #userAvatar {
border-color: var(--day-primary);
}

#userAvatar:hover {
transform: scale(1.1);
box-shadow: 0 0 18px rgba(0,247,255,0.6);
}

/* OVERLAY */
#overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.55);
z-index: 1998;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
backdrop-filter: blur(3px);
}

#overlay.open {
opacity: 1;
pointer-events: all;
}

/* SIDEBAR */
#sidebar {
position: fixed;
top: 0;
right: -360px;
width: 320px;
max-width: 90vw;
height: 100%;
background: rgba(10,10,30,0.97);
border-left: 1px solid rgba(0,247,255,0.25);
backdrop-filter: blur(18px);
z-index: 1999;
transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
display: flex;
flex-direction: column;
overflow: hidden;
}

.light-mode #sidebar {
background: rgba(248,249,250,0.98);
border-left-color: var(--day-border);
}

#sidebar.open {
right: 0;
}

.sidebar-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 1.2rem 1.4rem;
border-bottom: 1px solid rgba(0,247,255,0.15);
flex-shrink: 0;
}

.light-mode .sidebar-header {
border-bottom-color: var(--day-border);
}

.sidebar-header h3 {
font-family: 'Courier New', monospace;
font-size: 1rem;
color: var(--primary);
letter-spacing: 1px;
}

.light-mode .sidebar-header h3 {
color: var(--day-primary);
}

.sidebar-close {
background: none;
border: none;
color: var(--gray);
font-size: 1.1rem;
cursor: pointer;
width: 32px;
height: 32px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
transition: var(--transition);
}

.sidebar-close:hover {
color: var(--primary);
background: rgba(0,247,255,0.1);
}

.sidebar-body {
flex: 1;
overflow-y: auto;
padding: 1.5rem 1.4rem;
display: flex;
flex-direction: column;
gap: 1.4rem;
}

.sidebar-body::-webkit-scrollbar {
width: 4px;
}

.sidebar-body::-webkit-scrollbar-track {
background: transparent;
}

.sidebar-body::-webkit-scrollbar-thumb {
background: rgba(0,247,255,0.2);
border-radius: 2px;
}

.profile-block {
display: flex;
flex-direction: column;
align-items: center;
gap: 0.85rem;
padding: 1.5rem 1.5rem 1.2rem;
background: rgba(0,247,255,0.04);
border: 1px solid rgba(0,247,255,0.12);
border-radius: var(--radius);
}

.light-mode .profile-block {
background: rgba(93,138,168,0.05);
border-color: var(--day-border);
}

.avatar-wrapper {
position: relative;
width: 82px;
height: 82px;
flex-shrink: 0;
}

#sidebarAvatar {
width: 82px;
height: 82px;
border-radius: 50%;
border: 3px solid var(--primary);
object-fit: cover;
box-shadow: 0 0 20px rgba(0,247,255,0.4);
background: rgba(0,247,255,0.05);
display: block;
}

.light-mode #sidebarAvatar {
border-color: var(--day-primary);
}

#editAvatarBtn {
position: absolute;
bottom: 0;
right: 0;
width: 26px;
height: 26px;
border-radius: 50%;
background: var(--primary);
border: 2px solid rgba(10,10,30,0.9);
color: #000;
font-size: 0.65rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: var(--transition);
box-shadow: 0 0 8px rgba(0,247,255,0.5);
}

.light-mode #editAvatarBtn {
background: var(--day-primary);
border-color: rgba(248,249,250,0.9);
color: #fff;
}

#editAvatarBtn:hover {
transform: scale(1.15);
box-shadow: 0 0 14px rgba(0,247,255,0.7);
}

.profile-name {
font-size: 1.05rem;
font-weight: 700;
text-align: center;
}

.profile-email {
font-size: 0.78rem;
color: var(--gray);
text-align: center;
word-break: break-all;
}

#avatarBar {
display: none;
align-items: center;
gap: 0.5rem;
padding: 0.7rem 0.9rem;
background: rgba(10,10,30,0.97);
border: 1px solid rgba(0,247,255,0.35);
border-radius: 50px;
box-shadow: 0 0 24px rgba(0,247,255,0.25);
animation: slideUp 0.25s ease-out;
width: 100%;
}

.light-mode #avatarBar {
background: rgba(248,249,250,0.98);
border-color: var(--day-border);
box-shadow: var(--day-shadow);
}

#avatarBar.visible {
display: flex;
}

@keyframes slideUp {
from {
opacity: 0;
transform: translateY(8px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

#avatarBar i {
color: var(--primary);
font-size: 0.85rem;
flex-shrink: 0;
}

.light-mode #avatarBar i {
color: var(--day-primary);
}

#avatarUrlInput {
flex: 1;
background: transparent;
border: none;
outline: none;
color: #fff;
font-size: 0.83rem;
font-family: 'Segoe UI', Tahoma, sans-serif;
min-width: 0;
}

.light-mode #avatarUrlInput {
color: var(--day-text);
}

#avatarUrlInput::placeholder {
color: #555;
}

.light-mode #avatarUrlInput::placeholder {
color: #aaa;
}

.bar-btn {
width: 28px;
height: 28px;
border-radius: 50%;
border: none;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.75rem;
flex-shrink: 0;
transition: var(--transition);
}

#applyAvatarBtn {
background: var(--primary);
color: #000;
}

#applyAvatarBtn:hover {
background: #00d4dc;
transform: scale(1.1);
}

#cancelAvatarBtn {
background: rgba(255,60,60,0.15);
color: #ff6b6b;
border: 1px solid rgba(255,60,60,0.3);
}

#cancelAvatarBtn:hover {
background: rgba(255,60,60,0.3);
transform: scale(1.1);
}

.info-card {
background: rgba(0,247,255,0.04);
border: 1px solid rgba(0,247,255,0.1);
border-radius: var(--radius);
padding: 1rem 1.1rem;
}

.light-mode .info-card {
background: rgba(93,138,168,0.05);
border-color: var(--day-border);
}

.info-card-title {
font-size: 0.72rem;
text-transform: uppercase;
letter-spacing: 0.08em;
color: var(--gray);
margin-bottom: 0.65rem;
font-weight: 600;
}

.info-row {
display: flex;
align-items: center;
gap: 0.6rem;
font-size: 0.85rem;
padding: 0.3rem 0;
color: var(--light);
}

.light-mode .info-row {
color: var(--day-text);
}

.info-row i {
color: var(--primary);
width: 16px;
text-align: center;
font-size: 0.9rem;
}

.light-mode .info-row i {
color: var(--day-primary);
}

.sidebar-footer {
padding: 1rem 1.4rem 1.4rem;
border-top: 1px solid rgba(0,247,255,0.12);
flex-shrink: 0;
}

.light-mode .sidebar-footer {
border-top-color: var(--day-border);
}

#logoutBtn {
width: 100%;
padding: 0.75rem;
border-radius: var(--radius);
background: rgba(255,60,60,0.1);
color: #ff6b6b;
border: 1px solid rgba(255,60,60,0.3);
font-size: 0.9rem;
font-weight: 700;
cursor: pointer;
transition: var(--transition);
display: flex;
align-items: center;
justify-content: center;
gap: 0.6rem;
font-family: 'Segoe UI', Tahoma, sans-serif;
}

#logoutBtn:hover {
background: rgba(255,60,60,0.22);
box-shadow: 0 0 15px rgba(255,60,60,0.3);
transform: translateY(-1px);
}

/* CONTENIDO PRINCIPAL */
.content {
max-width: 1200px;
margin: 2rem auto;
padding: 0 2rem;
width: 100%;
flex: 1;
}

h1 {
color: var(--primary);
margin-bottom: 2rem;
text-align: center;
font-size: 2.2rem;
position: relative;
padding-bottom: 15px;
font-family: 'Courier New', monospace;
}

.light-mode h1 {
color: var(--day-primary);
}

h1:after {
content: '';
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 100px;
height: 4px;
background: linear-gradient(to right, var(--primary), var(--secondary));
border-radius: 2px;
}

.light-mode h1:after {
background: linear-gradient(to right, var(--day-primary), var(--day-secondary));
}

/* Búsqueda */
.search-container {
max-width: 700px;
margin: 0 auto 2rem;
position: relative;
}

.search-box {
display: flex;
gap: 10px;
}

.search-box input {
flex: 1;
padding: 16px 24px;
border: 2px solid rgba(0,247,255,0.3);
border-radius: 50px;
font-size: 1rem;
background: rgba(10,10,24,0.4);
color: var(--light);
transition: var(--transition);
}

.light-mode .search-box input {
background: rgba(255,255,255,0.8);
border-color: var(--day-border);
color: var(--day-text);
}

.search-box input:focus {
border-color: var(--primary);
outline: none;
box-shadow: 0 4px 15px rgba(0,247,255,0.2);
}

.light-mode .search-box input:focus {
border-color: var(--day-primary);
box-shadow: var(--day-shadow);
}

.search-box button {
background: linear-gradient(to right, var(--primary), var(--secondary));
color: #fff;
border: none;
border-radius: 50px;
padding: 0 28px;
font-size: 1rem;
font-weight: 600;
cursor: pointer;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition);
box-shadow: 0 4px 15px rgba(0,247,255,0.3);
}

.light-mode .search-box button {
background: linear-gradient(to right, var(--day-primary), var(--day-secondary));
}

.search-box button:hover {
transform: translateY(-2px);
box-shadow: 0 6px 18px rgba(0,247,255,0.4);
}

/* Cuadrícula de asignaturas */
.subjects-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
gap: 25px;
margin-bottom: 2rem;
}

.subject-card {
background: rgba(10,10,24,0.7);
backdrop-filter: blur(10px);
border-radius: var(--radius);
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.3);
transition: var(--transition);
cursor: pointer;
position: relative;
border: 1px solid rgba(0,247,255,0.2);
}

.light-mode .subject-card {
background: var(--day-card);
border-color: var(--day-border);
box-shadow: var(--day-shadow);
}

.subject-card:hover {
transform: translateY(-8px);
box-shadow: 0 12px 30px rgba(0,247,255,0.4);
border-color: var(--primary);
}

.light-mode .subject-card:hover {
box-shadow: 0 12px 25px rgba(93,138,168,0.3);
border-color: var(--day-primary);
}

.subject-icon {
height: 140px;
background: linear-gradient(135deg, var(--primary), var(--secondary));
display: flex;
align-items: center;
justify-content: center;
color: white;
font-size: 3rem;
}

.light-mode .subject-icon {
background: linear-gradient(135deg, var(--day-primary), var(--day-secondary));
}

.subject-info {
padding: 20px;
}

.subject-info h3 {
font-size: clamp(1.1rem, 2.5vw, 1.4rem);
margin-bottom: 10px;
color: var(--light);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.light-mode .subject-info h3 {
color: var(--day-text);
}

.subject-info p {
color: var(--gray);
font-size: 0.95rem;
margin-bottom: 15px;
min-height: 60px;
}

.light-mode .subject-info p {
color: #6c757d;
}

.file-count {
display: flex;
align-items: center;
gap: 8px;
color: var(--primary);
font-weight: 600;
font-size: 0.9rem;
}

.light-mode .file-count {
color: var(--day-primary);
}

/* Navegación */
.nav-btn {
background: rgba(0,247,255,0.15);
border: none;
color: var(--primary);
padding: 10px 16px;
border-radius: 50px;
cursor: pointer;
font-weight: 600;
display: flex;
align-items: center;
gap: 8px;
transition: var(--transition);
backdrop-filter: blur(4px);
}

.light-mode .nav-btn {
background: rgba(93,138,168,0.15);
color: var(--day-primary);
}

.nav-btn:hover {
background: rgba(0,247,255,0.25);
transform: translateY(-2px);
}

.light-mode .nav-btn:hover {
background: rgba(93,138,168,0.25);
}

/* Cuadrícula de carpetas */
.folders-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
gap: 25px;
margin-bottom: 2rem;
}

.folder-card {
background: rgba(10,10,24,0.7);
backdrop-filter: blur(10px);
border-radius: var(--radius);
overflow: hidden;
box-shadow: 0 8px 20px rgba(0,0,0,0.3);
transition: var(--transition);
cursor: pointer;
position: relative;
border: 1px solid rgba(0,247,255,0.2);
padding: 25px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
text-align: center;
min-height: 180px;
}

.light-mode .folder-card {
background: var(--day-card);
border-color: var(--day-border);
box-shadow: var(--day-shadow);
}

.folder-card:hover {
transform: translateY(-8px);

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDCm1pFZLRXk34UIGU3UY0ltLkyHkElsIg",
authDomain: "onelife-cec55.firebaseapp.com",
projectId: "onelife-cec55",
storageBucket: "onelife-cec55.firebasestorage.app",
messagingSenderId: "599128086819",
appId: "1:599128086819:web:af149214fe5b68a12ad496",
databaseURL: "https://onelife-cec55-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const userAvatar = document.getElementById('userAvatar');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const sidebarClose = document.getElementById('sidebarClose');
const sidebarAvatar = document.getElementById('sidebarAvatar');
const sidebarName = document.getElementById('sidebarName');
const sidebarEmail = document.getElementById('sidebarEmail');
const editAvatarBtn = document.getElementById('editAvatarBtn');
const avatarBar = document.getElementById('avatarBar');
const avatarUrlInput = document.getElementById('avatarUrlInput');
const applyAvatarBtn = document.getElementById('applyAvatarBtn');
const cancelAvatarBtn = document.getElementById('cancelAvatarBtn');
const authArea = document.querySelector('.auth-area');
const toast = document.getElementById('toast');

const CK_LOGGED = 'ol_logged';
const CK_AVATAR = 'ol_avatar';
const CK_NAME = 'ol_name';
const CK_EMAIL = 'ol_email';

const cachedLogged = localStorage.getItem(CK_LOGGED);
if (cachedLogged === 'true') {
loginBtn.style.display = 'none';
userAvatar.style.display = 'inline-block';
const cv = localStorage.getItem(CK_AVATAR);
const cn = localStorage.getItem(CK_NAME);
const ce = localStorage.getItem(CK_EMAIL);
if (cv) { userAvatar.src = cv; sidebarAvatar.src = cv; }
if (cn) sidebarName.textContent = cn;
if (ce) sidebarEmail.textContent = ce;
} else if (cachedLogged === 'false') {
loginBtn.style.display = 'inline-flex';
userAvatar.style.display = 'none';
}
authArea.classList.add('ready');

function showToast(msg, isError = false) {
toast.textContent = msg;
toast.className = 'show' + (isError ? ' error' : '');
clearTimeout(toast._t);
toast._t = setTimeout(() => { toast.className = ''; }, 3000);
}

function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('open'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); hideAvatarBar(); }

userAvatar.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
overlay.addEventListener('click', closeSidebar);

function showAvatarBar() { avatarBar.classList.add('visible'); avatarUrlInput.value = ''; avatarUrlInput.focus(); }
function hideAvatarBar() { avatarBar.classList.remove('visible'); avatarUrlInput.value = ''; }

editAvatarBtn.addEventListener('click', () => {
avatarBar.classList.contains('visible') ? hideAvatarBar() : showAvatarBar();
});

cancelAvatarBtn.addEventListener('click', hideAvatarBar);

avatarUrlInput.addEventListener('keydown', e => {
if (e.key === 'Enter') applyAvatarBtn.click();
if (e.key === 'Escape') hideAvatarBar();
});

applyAvatarBtn.addEventListener('click', async () => {
const user = auth.currentUser;
if (!user) { showToast('Inicia sesión primero.', true); return; }
const url = avatarUrlInput.value.trim();
if (!url) { showToast('Pega una URL de imagen válida.', true); return; }

const testImg = new Image();
testImg.onload = async () => {
try {
await set(ref(db, 'users/' + user.uid + '/avatarUrl'), url);
applyAvatarToUI(url);
localStorage.setItem(CK_AVATAR, url);
hideAvatarBar();
showToast('✓ Foto de perfil actualizada');
} catch (err) { showToast('Error al guardar: ' + err.message, true); }
};
testImg.onerror = () => showToast('La URL no es una imagen válida.', true);
testImg.src = url;
});

function applyAvatarToUI(url) {
if (!url) return;
userAvatar.src = url;
sidebarAvatar.src = url;
}

function saveCache(user, avatarUrl) {
localStorage.setItem(CK_LOGGED, 'true');
localStorage.setItem(CK_NAME, user.displayName || '');
localStorage.setItem(CK_EMAIL, user.email || '');
if (avatarUrl) localStorage.setItem(CK_AVATAR, avatarUrl);
}

function clearCache() {
localStorage.setItem(CK_LOGGED, 'false');
localStorage.removeItem(CK_AVATAR);
localStorage.removeItem(CK_NAME);
localStorage.removeItem(CK_EMAIL);
}

async function loadProfile(user) {
sidebarName.textContent = user.displayName || 'Usuario';
sidebarEmail.textContent = user.email || '';
const cached = localStorage.getItem(CK_AVATAR);
const initial = cached || user.photoURL || '';
applyAvatarToUI(initial);

try {
const snap = await get(ref(db, 'users/' + user.uid));
const dbAvatar = snap.exists() && snap.val().avatarUrl ? snap.val().avatarUrl : null;
if (dbAvatar && dbAvatar !== initial) {
applyAvatarToUI(dbAvatar);
localStorage.setItem(CK_AVATAR, dbAvatar);
}
saveCache(user, dbAvatar || initial);
} catch (err) {
saveCache(user, initial);
console.warn('DB no disponible:', err.message);
}
}

loginBtn.addEventListener('click', async () => {
try { await signInWithPopup(auth, provider); }
catch (err) { showToast('Error al iniciar sesión.', true); console.error(err); }
});

logoutBtn.addEventListener('click', async () => {
await signOut(auth);
clearCache();
closeSidebar();
showToast('Sesión cerrada correctamente');
});

onAuthStateChanged(auth, async user => {
if (user) {
loginBtn.style.display = 'none';
userAvatar.style.display = 'inline-block';
await loadProfile(user);
} else {
loginBtn.style.display = 'inline-flex';
userAvatar.style.display = 'none';
sidebarName.textContent = '—';
sidebarEmail.textContent = '—';
sidebarAvatar.src = '';
userAvatar.src = '';
if (localStorage.getItem(CK_LOGGED) === 'true') clearCache();
else localStorage.setItem(CK_LOGGED, 'false');
}
});
</script>

// Efecto cascada neon
const neonCascade = document.getElementById('neonCascade');
function createCascadeParticle() {
const particle = document.createElement('div');
particle.classList.add('cascade-particle');
const posX = Math.random() * 100;
particle.style.left = `${posX}%`;
const size = 1 + Math.random() * 2;
const height = 10 + Math.random() * 20;
particle.style.width = `${size}px`;
particle.style.height = `${height}px`;

const isLightMode = document.body.classList.contains('light-mode');
if (isLightMode) {
particle.style.background = 'var(--day-primary)';
particle.style.boxShadow = '0 0 8px var(--day-primary), 0 0 15px var(--day-primary)';
} else {
particle.style.background = 'var(--primary)';
particle.style.boxShadow = '0 0 10px var(--primary), 0 0 20px var(--primary)';
}

particle.style.opacity = '0';
neonCascade.appendChild(particle);

const animationDuration = 3 + Math.random() * 4;
const animationDelay = Math.random() * 2;

particle.animate([
{ transform: 'translateY(-20px)', opacity: 0 },
{ transform: 'translateY(0)', opacity: isLightMode ? 0.6 : 0.7 },
{ transform: `translateY(${window.innerHeight}px)`, opacity: 0 }
], {
duration: animationDuration * 1000,
delay: animationDelay * 1000,
easing: 'cubic-bezier(0.4, 0, 0.2, 1)'
});

setTimeout(() => {
particle.remove();
}, (animationDuration + animationDelay) * 1000);
}

function generateCascadeParticles() {
createCascadeParticle();
setTimeout(generateCascadeParticles, 100 + Math.random() * 200);
}
generateCascadeParticles();

const savedTheme = localStorage.getItem('theme');
if (savedTheme) {
document.body.classList.toggle('light-mode', savedTheme === 'light');
updateThemeIcon();
}

themeToggle.addEventListener('click', () => {
document.body.classList.toggle('light-mode');
localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
updateThemeIcon();
});

let currentSubjectFolders = [];
let currentFolderFiles = [];
let currentSubjectId = null;

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
renderSubjects();

document.getElementById('searchInput').addEventListener('keypress', (e) => {
if (e.key === 'Enter') filterSubjects();
});

document.getElementById('fileSearchInput').addEventListener('keypress', (e) => {
if (e.key === 'Enter') filterFiles();
});

document.getElementById('backToFoldersBtn').onclick = () => showFilesPage(currentSubjectId);
});

// Renderizar asignaturas
function renderSubjects() {
const grid = document.getElementById('subjectsGrid');
grid.innerHTML = '';

subjectsData.forEach(subject => {
const totalFiles = subject.folders.reduce((count, folder) => count + folder.files.length, 0);
const card = document.createElement('div');
card.className = 'subject-card';
card.innerHTML = `
<div class="subject-icon">
<i class="${subject.icon}"></i>
</div>
<div class="subject-info">
<h3>${subject.title}</h3>
<p>${subject.description}</p>
<div class="file-count">
<i class="fas fa-file-pdf"></i>
<span>${totalFiles} archivos en ${subject.folders.length} carpetas</span>
</div>
</div>
`;
card.addEventListener('click', () => showFilesPage(subject.id));
grid.appendChild(card);
});
}

// Filtrar asignaturas
function filterSubjects() {
const searchTerm = document.getElementById('searchInput').value.toLowerCase();
const grid = document.getElementById('subjectsGrid');
const cards = grid.getElementsByClassName('subject-card');
let found = false;

for (let card of cards) {
const title = card.querySelector('h3').textContent.toLowerCase();
if (title.includes(searchTerm)) {
card.style.display = '';
found = true;
} else {
card.style.display = 'none';
}
}

if (!found && searchTerm) {
showToast('No se encontraron asignaturas.', true);
}
}

// Mostrar carpetas de asignatura
function showFilesPage(subjectId) {
const subject = subjectsData.find(s => s.id === subjectId);
if (!subject) return;

currentSubjectId = subjectId;
currentSubjectFolders = subject.folders;
currentFolderFiles = [];

document.getElementById('main-page').style.display = 'none';

const filesPage = document.getElementById('files-page');
filesPage.style.display = 'block';
filesPage.style.animation = 'fadeIn 0.4s ease';

document.getElementById('backToSubjectsBtn').style.display = 'flex';
document.getElementById('backToFoldersBtn').style.display = 'none';

document.getElementById('subject-title').textContent = subject.title;

document.getElementById('fileSearchContainer').style.display = 'none';
document.getElementById('filesGrid').style.display = 'none';
document.getElementById('filesGrid').innerHTML = '';

renderFolders(currentSubjectFolders);
}

// Renderizar carpetas
function renderFolders(foldersToRender) {
const grid = document.getElementById('foldersGrid');
grid.innerHTML = '';
grid.style.display = 'grid';

if (foldersToRender.length === 0) {
grid.innerHTML = '<p style="text-align: center; color: #666; margin-top: 30px;">No se encontraron carpetas.</p>';
return;
}

foldersToRender.forEach(folder => {
const card = document.createElement('div');
card.className = 'folder-card';
card.innerHTML = `
<i class="${folder.icon}"></i>
<h3>${folder.name}</h3>
<p style="font-size: 0.9em; color: #888;">${folder.files.length} archivos</p>
`;
card.addEventListener('click', () => showFolderContents(folder));
grid.appendChild(card);
});
}

// Mostrar archivos de carpeta
function showFolderContents(folder) {
currentFolderFiles = folder.files;

document.getElementById('foldersGrid').style.display = 'none';
document.getElementById('fileSearchContainer').style.display = 'block';
document.getElementById('filesGrid').style.display = 'grid';
document.getElementById('fileSearchInput').value = '';

document.getElementById('backToFoldersBtn').style.display = 'flex';
document.getElementById('backToSubjectsBtn').style.display = 'flex';

const subjectTitle = subjectsData.find(s => s.id === currentSubjectId).title;
document.getElementById('subject-title').textContent = `${folder.name} (${subjectTitle})`;

renderFiles(currentFolderFiles);
}

// Renderizar archivos
function renderFiles(filesToRender) {
const grid = document.getElementById('filesGrid');
grid.innerHTML = '';

if (filesToRender.length === 0) {
grid.innerHTML = '<p style="text-align: center; color: #666; margin-top: 30px;">No hay archivos disponibles.</p>';
return;
}

filesToRender.forEach(file => {
const card = document.createElement('div');
card.className = 'file-card';
card.innerHTML = `
<div class="file-header">
<div class="file-title">${file.name}</div>
<div class="file-actions">
<button class="view-btn ${file.available ? '' : 'disabled-btn'}"
title="${file.available ? 'Ver PDF' : 'No disponible'}">
<i class="fas fa-eye"></i>
</button>
</div>
</div>
<div class="file-description">${file.description}</div>
<div class="file-meta">
<div class="file-date"><i class="far fa-calendar"></i> ${file.date}</div>
<div class="file-size"><i class="fas fa-weight-hanging"></i> ${file.size}</div>
</div>
`;

if (file.available) {
card.querySelector('.view-btn').addEventListener('click', (e) => {
e.stopPropagation();
showPDF(file.driveId, file.name);
});
}

grid.appendChild(card);
});
}

// Filtrar archivos
function filterFiles() {
const searchTerm = document.getElementById('fileSearchInput').value.toLowerCase();
const filtered = currentFolderFiles.filter(file =>
file.name.toLowerCase().includes(searchTerm)
);
renderFiles(filtered);
}

// Mostrar PDF
function showPDF(driveId, fileName) {
const container = document.getElementById('pdfViewerContainer');
const viewer = document.getElementById('pdfViewer');
const title = document.getElementById('pdfTitle');

title.textContent = fileName;
viewer.src = `https://drive.google.com/file/d/${driveId}/preview`;
container.style.display = 'flex';
}

// Ocultar PDF
function hidePDF() {
document.getElementById('pdfViewerContainer').style.display = 'none';
document.getElementById('pdfViewer').src = '';
}

// Volver a página principal
function showMainPage() {
document.getElementById('files-page').style.display = 'none';
document.getElementById('main-page').style.display = 'block';
document.getElementById('main-page').style.animation = 'fadeIn 0.4s ease';
document.getElementById('backToSubjectsBtn').style.display = 'none';
document.getElementById('backToFoldersBtn').style.display = 'none';
currentSubjectId = null;
}

document.addEventListener('touchstart', function() {}, {passive: true});
</script>
