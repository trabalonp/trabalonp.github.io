        function saveVolumeToFirebase(volume) { if (!currentUser) return; set(ref(db, `users/${currentUser.uid}/settings/volume`), parseInt(volume)); }
        function updateVolumeUI(value) { dom.volIcon.querySelector('i').className = value == 0 ? 'fas fa-volume-mute' : (value < 50 ? 'fas fa-volume-down' : 'fas fa-volume-up'); dom.volSlider.style.setProperty('--volume-progress', `${value}%`); }
        dom.volSlider.addEventListener('input', () => { const newVolume = dom.volSlider.value; if (currentAudio) currentAudio.volume = newVolume / 100; lastVolume = newVolume; muted = newVolume == 0; updateVolumeUI(newVolume); saveVolumeToFirebase(newVolume); });
        dom.volIcon.addEventListener('click', () => { if (muted) { muted = false; dom.volSlider.value = lastVolume > 0 ? lastVolume : 80; } else { muted = true; lastVolume = dom.volSlider.value; dom.volSlider.value = 0; } dom.volSlider.dispatchEvent(new Event('input')); });
        function updateControlButtons() { dom.shuffleBtn.classList.toggle('active', isShuffle); dom.repeatBtn.classList.toggle('active', isRepeat); }
        function renderGrid(stations) { const grid = document.getElementById('stations-grid'); if (!grid) return; grid.innerHTML = stations.map(s => { const fav = favorites.includes(s.id), active = currentStation && currentStation.id === s.id; return `<div class="station-card ${active ? 'active' : ''}" data-id="${s.id}"><div class="station-art" style="background:${getGenreColor(s.genre[0])}"><div class="station-art-bg"><i class="fas fa-music"></i></div><button class="play-overlay"><i class="fas ${active && isPlaying ? 'fa-pause' : 'fa-play'}"></i></button></div><button class="card-fav-btn ${fav ? 'favorited' : ''}" data-id="${s.id}" title="${fav ? 'Quitar' : 'Añadir'}"><i class="fas fa-heart"></i></button><div class="station-card-name">${s.name}</div><div class="station-card-loc">${s.location}</div></div>`; }).join(''); grid.querySelectorAll('.station-card').forEach(card => card.addEventListener('click', e => { if (e.target.closest('.card-fav-btn')) return; const station = radioStations.find(s => s.id === parseInt(card.dataset.id)); if (station) handleCardClick(station); })); grid.querySelectorAll('.card-fav-btn').forEach(btn => btn.addEventListener('click', () => toggleFavorite(parseInt(btn.dataset.id)))); }
        function renderFavorites() { const list = document.getElementById('favorites-list'); if (!list) return; if (!favorites.length) { const msg = currentUser ? '<strong>Crea tu primera playlist</strong><p>¡Es muy fácil! Te vamos a ayudar.</p>' : '<strong>Inicia sesión</strong><p>Guarda tus emisoras favoritas.</p>'; list.innerHTML = `<div class="fav-empty">${msg}</div>`; return; } list.innerHTML = favorites.map(id => { const s = radioStations.find(r => r.id === id); if (!s) return ''; const active = currentStation && currentStation.id === s.id; return `<div class="fav-item ${active ? 'playing' : ''}" data-id="${s.id}"><div class="fav-thumb" style="background:${getGenreColor(s.genre[0])}"><i class="fas fa-music"></i>${active ? '<div class="playing-overlay"><i class="fas fa-volume-up"></i></div>' : ''}</div><div class="fav-info"><div class="fav-name">${s.name}</div><div class="fav-location">${s.location}</div></div></div>`; }).join(''); list.querySelectorAll('.fav-item').forEach(item => item.addEventListener('click', () => { const station = radioStations.find(s => s.id === parseInt(item.dataset.id)); if (station) handleCardClick(station); })); }
        function handleCardClick(station) { (currentStation && currentStation.id === station.id) ? togglePlayPause() : playStation(station); }
        function playStation(station) { if (currentAudio) currentAudio.pause(); currentStation = station; isPlaying = true; document.getElementById('player-art').style.background = getGenreColor(station.genre[0]); document.getElementById('player-art').innerHTML = '<i class="fas fa-music"></i>'; document.getElementById('player-name').textContent = station.name; document.getElementById('player-loc').textContent = station.location; document.getElementById('live-badge').style.display = 'flex'; updatePlayerHeart(); updatePlayBtn(); currentAudio = new Audio(station.streamUrl); currentAudio.volume = dom.volSlider.value / 100; currentAudio.play().catch(() => { isPlaying = false; updatePlayBtn(); }); currentAudio.addEventListener('error', () => { isPlaying = false; updatePlayBtn(); }); renderGrid(filteredStations); renderFavorites(); }
        function togglePlayPause() { if (!currentStation) return; if (!currentAudio) { playStation(currentStation); return; } isPlaying ? currentAudio.pause() : currentAudio.play().catch(()=>{}); isPlaying = !isPlaying; updatePlayBtn(); renderGrid(filteredStations); }
        function updatePlayBtn() { const icon = isPlaying ? 'fa-pause' : 'fa-play'; dom.playBtnDesktop.innerHTML = `<i class="fas ${icon}"></i>`; dom.playBtnMobile.innerHTML = `<i class="fas ${icon}"></i>`; }
        function updatePlayerHeart() { if (!currentStation) return; const isFav = favorites.includes(currentStation.id); dom.heartBtnDesktop.classList.toggle('favorited', isFav); dom.heartBtnMobile.classList.toggle('favorited', isFav); }
        function playAdjacent(dir) { if (!currentStation) return; if (isShuffle) { playRandom(); return; } const currentIndex = filteredStations.findIndex(s => s.id === currentStation.id); if (currentIndex === -1) return; const nextIndex = (currentIndex + dir + filteredStations.length) % filteredStations.length; playStation(filteredStations[nextIndex]); }
        function playRandom() { if (filteredStations.length < 2) return; let randomIndex; do { randomIndex = Math.floor(Math.random() * filteredStations.length); } while (filteredStations[randomIndex].id === currentStation.id); playStation(filteredStations[randomIndex]); }
        function applyFilters() { const search = document.getElementById('search-input').value.toLowerCase().trim(); filteredStations = radioStations.filter(s => s.name.toLowerCase().includes(search) || s.location.toLowerCase().includes(search)); renderGrid(filteredStations); }
        function getGenreColor(genre) { const c = { rock: '#b91c1c', pop: '#7c3aed', news: '#1d4ed8', classical: '#b45309', eclectic: '#0f766e', sports: '#15803d', electronic: '#8b5cf6', hiphop: '#f97316', ambient: '#0891b2', jazz: '#ca8a04' }; return `linear-gradient(135deg, ${c[genre] || '#374151'}, #121212)`; }
        document.addEventListener('DOMContentLoaded', () => {
            renderGrid(filteredStations); updateVolumeUI(dom.volSlider.value);
            document.getElementById('search-input').addEventListener('input', applyFilters);
            dom.playBtnDesktop.addEventListener('click', togglePlayPause); dom.playBtnMobile.addEventListener('click', togglePlayPause);
            document.getElementById('prev-btn').addEventListener('click', () => playAdjacent(-1));
            document.getElementById('next-btn').addEventListener('click', () => playAdjacent(1));
            dom.heartBtnDesktop.addEventListener('click', () => { if(currentStation) toggleFavorite(currentStation.id); });
            dom.heartBtnMobile.addEventListener('click', () => { if(currentStation) toggleFavorite(currentStation.id); });
            dom.shuffleBtn.addEventListener('click', () => { isShuffle = !isShuffle; updateControlButtons(); });
            dom.repeatBtn.addEventListener('click', () => { if (currentStation) playStation(currentStation); });
            [dom.lyricsBtn, dom.queueBtn, dom.deviceBtn].forEach(btn => btn.addEventListener('click', () => alert('Función no implementada.')));
        });
    </script>
</body>
